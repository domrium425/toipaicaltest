  <style>
/* ================== (CSS 原封不動) ================== */
:root{
  --bg:#0f0f0f;
  --card:#1c1c1c;
  --muted:#2a2a2a;
  --text:#ffffff;
  --sub:#bdbdbd;
  --gold:#d4af37;
  --accent:#00ff88;
  --danger:#cc0000;
  --shadow: rgba(212,175,55,0.12);
  --line: rgba(128,128,128,0.25);

  --pos:#1f8a3a;  /* 深綠 */
  --neg:#ff3b30;
}
*{ box-sizing:border-box; }
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  padding-bottom:180px;
  -webkit-text-size-adjust:100%;
}
body.white{
  --bg:#f5f5f5;
  --card:#ffffff;
  --muted:#e8e8e8;
  --text:#000000;
  --sub:#333333;
  --gold:#b88a12;
  --accent:#007aff;
  --danger:#ff3b30;
  --shadow: rgba(0,0,0,0.06);
  --line: rgba(0,0,0,0.12);
  --pos:#1f8a3a;
  --neg:#ff3b30;
}

/* ===== 底設定 UI ===== */
.baseRow{
  display:flex;
  align-items:center;
  gap:10px;
}

/* 左邊 group */
.baseLeft{
  display:flex;
  align-items:center;
  gap:10px;
}

/* input 外框 */
.baseInputWrap{
  display:flex;
  align-items:center;
  gap:6px;

  background:var(--muted);
  border-radius:999px;
  padding:4px 8px;

  border:1px solid var(--line);
}

/* input */
#baseFan{
  width:50px !important;
  max-width:50px !important;
  flex:0 0 auto !important;
  padding:6px 4px;
  border:none;
  background:transparent;
  color:var(--gold);
  text-align:center;
  font-weight:900;
  outline:none;
  text-align:center;
  text-align-last:center;

  font-size:16px; /* 防 zoom */
}

/* Fixbar右掣icon */
#toTab2Btn .iosSvgIcon{
  width:20px;
  height:20px;
}

#toTab2Btn svg{
  width:22px;
  height:22px;
}

#toTab2Btn .iosChevronR{
  width:20px;
  height:20px;
  display:block;
  transform: translateX(0.25px);
  transform: translateY(-1.5px);
}

#toTab2Btn .iosChevronR path{
  fill:none;
  stroke:currentColor;
  stroke-width:2.4;
  stroke-linecap:round;
  stroke-linejoin:round;
}

/* ✅ 通用細數字 input */
.miniNum{
  width:50px !important;
  text-align:center;
  text-align-last:center;
  color: var(--gold);
  font-weight:900;
  font-size:16px;

  transform: translateY(-0.75px);

  /* 🔥 清除所有 input 樣式 */
  border:none !important;
  outline:none !important;
  padding:0 !important;
  background:transparent !important;
  border-radius:0 !important;

  -webkit-appearance:none;
}

/* 番字 */
.baseInputWrap span{
  font-size:12px;
  color:var(--sub);
  font-weight:700;
}

/* 重置掣細啲 */
#resetBaseBtn{
  padding:6px 10px;
  font-size:13px;
  border-radius:10px;
}

/* iOS 防 zoom：所有 form control 實際 16px */
input, select, button, textarea{ font-size:16px; }

.container{ padding:0 14px; max-width:980px; margin:0 auto; }
header{
  padding:14px 14px 8px 14px;
  text-align:center;
  font-size:20px;
  font-weight:900;
  letter-spacing:0.5px;
}
.topbar{
  display:flex;
  gap:10px;
  justify-content:center;
  align-items:center;
  padding:0 14px 12px 14px;
  flex-wrap:wrap;
}
.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:var(--muted);
  color:var(--text);
  font-weight:900;
  font-size:13px;
}
.badge.gold{ background:rgba(212,175,55,0.18); color:var(--gold); }

.bigBadge{
  font-size:20px;
  padding:12px 18px;
  box-shadow:0 0 12px rgba(212,175,55,0.25);
}

.btn{
  border:none;
  border-radius:999px;
  padding:10px 14px;
  font-weight:900;
  background:var(--gold);
  color:#000;
  cursor:pointer;
  -webkit-tap-highlight-color: transparent;
}
.btn.secondary{ background:var(--muted); color:var(--text); font-weight:800; }
.btn.danger{ background:var(--danger); color:#fff; }

.btn.smallBtn{
  padding: 6px 10px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1;
}

.baseRow{
  display:flex;
  align-items:center;
  gap:10px;
}

.baseRow input{
  width:45px;
  padding:6px 6px
  transform:scale(0.75);
  transform-origin:left center;
}

.baseRow .spacer{
  flex:1;
}

.tabs{
  display:flex;
  gap:8px;
  padding:0 14px 14px 14px;
  max-width:980px;
  margin:0 auto;
}
.tabBtn{
  flex:1;
  border:none;
  border-radius:14px;
  padding:12px 10px;
  font-weight:900;
  background:var(--muted);
  color:var(--sub);
  cursor:pointer;
  -webkit-tap-highlight-color: transparent;
}
.tabBtn.active{ background:var(--gold); color:#000; }

.card{
  background:var(--card);
  border-radius:18px;
  padding:14px;
  margin-bottom:14px;
  box-shadow: 0 0 22px var(--shadow);
}
.flatCard{ box-shadow:none; background:var(--card); }

h2{ margin:0 0 10px 0; color:var(--gold); font-size:18px; }
.small{ color:var(--sub); font-size:13px; line-height:1.6; }

.m{
  font-size:14px;
  color:var(--sub);
}

.xs{
  font-size:12px;
  color:var(--sub);
}

.xxs{
  font-size:11px;
  color:var(--sub);
}

.xxxs{
  font-size:7px;
  color:var(--sub);
}

.row{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
.row input{
  flex:0 0 auto;
}
.kv{ display:flex; justify-content:space-between; gap:10px; font-size:13px; color:var(--sub); margin-top:6px; }

.input, select{
  border:1px solid rgba(128,128,128,0.35);
  background:transparent;
  color:var(--text);
  border-radius:12px;
  padding:10px 12px;
  outline:none;
  max-width:100%;
}
body.white .input, body.white select{ border:1px solid rgba(0,0,0,0.2); }

select{
  appearance:none;
  -webkit-appearance:none;
  background-image:
    linear-gradient(45deg, transparent 50%, var(--sub) 50%),
    linear-gradient(135deg, var(--sub) 50%, transparent 50%);
  background-position:
    calc(100% - 18px) calc(50% - 2px),
    calc(100% - 12px) calc(50% - 2px);
  background-size:6px 6px, 6px 6px;
  background-repeat:no-repeat;
  padding-right:34px;
}

.input.num{ width:60px; }
@media (max-width:420px){
  .input.num{ width:100%; }
}

.table{ width:100%; border-collapse:collapse; margin-top:8px; font-size:14px; }
.table td{ padding:8px 6px; border-bottom:1px solid var(--line); }
.tRight{ text-align:right; }
.strong{ font-weight:900; }

details{
  background:var(--muted);
  border-radius:14px;
  padding:10px 10px;
  margin:10px 0;
}
details > summary{
  cursor:pointer;
  font-weight:900;
  color:var(--text);
  list-style:none;
  display:flex;
  align-items:center;
  gap:8px;
}
details > summary::-webkit-details-marker{ display:none; }
summary::before{
  content:"▶";
  display:inline-block;
  width:18px;
  transition:0.2s;
  color:var(--gold);
}
details[open] summary::before{ transform:rotate(90deg); }
.sumGold{ color:var(--gold); font-weight:900; }

.checkline{
  display:flex;
  align-items:center;
  gap:10px;
  padding:7px 4px;
  border-bottom:1px dashed var(--line);
}
.checkline:last-child{ border-bottom:none; }
.checkline label{ flex:1; cursor:pointer; }
.checkline .fan{ color:var(--gold); font-weight:900; }
.checkline.active{
  background:rgba(212,175,55,0.12);
  border-radius:10px;
  box-shadow:0 0 10px rgba(212,175,55,0.12);
}

.aiBox{
  background:rgba(0,255,136,0.08);
  border:1px solid rgba(0,255,136,0.25);
  padding:10px;
  border-radius:14px;
  font-size:14px;
  line-height:1.6;
}
.aiBox .warn{ color:#ffcc00; font-weight:900; }
.aiBox .tip{ color:var(--accent); font-weight:900; }
.aiBox .ok{ color:var(--sub); }

/* 固定總番（只喺 Tab1 用） */
.fixedTotal{
  position:fixed;
  left:0;
  bottom:0;
  width:100%;
  background:var(--card);
  border-top:2px solid var(--gold);
  padding:10px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  z-index:10;
}
.fixedTotal .big{ font-size:20px; font-weight:900; color:var(--gold); }

/* Tab1：番表內容細 1pt；大項目一行兩個 */
.tab1FanBody{ font-size:12px; }
.fanGrid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
}
.fanGrid details{ margin:0; }

/* 兩位數 count input */
.input.count2{
  width:3.5ch;
  padding:8px 8px;
  text-align:center;
  border-radius:10px;
}

/* ================= TAB2 ================= */
.t2TopBox{
  background:var(--card);
  border-radius:18px;
  padding:12px;
  margin-bottom:12px;
  box-shadow:0 0 22px var(--shadow);
}
.t2RowCenter{ display:flex; justify-content:center; align-items:center; gap:10px; flex-wrap:wrap; }
.t2InfoLine{
  margin-top:8px;
  font-size:13px;
  color:var(--sub);
  text-align:center;
  line-height:1.6;
}

.mjWrap{ width:100%; max-width:420px; margin:0 auto; }
.mjGrid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:1fr 1fr 1fr;
  gap:6px;
}
.mjCell{ width:100%; aspect-ratio:1/1; position:relative; }

/* 玩家正方形 */
.seat{
  width:100%;
  height:100%;
  background:var(--muted);
  border-radius:12px;
  padding:6px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  overflow:visible;
  position:relative;
  border:2px solid transparent;
}

.seat::before{
  content:"";
  position:absolute;
  inset:2px;
  border-radius:11px;
  border:1px solid rgba(255,255,255,0.08);
  pointer-events:none;
}

.seat::after{
  content:"";
  position:absolute;
  inset:6px;
  border-radius:9px;
  border:1px solid rgba(212,175,55,0.5);
  pointer-events:none;
}

.seat.dealer{
  border-color: rgba(212,175,55,0.95);
  box-shadow:0 0 0 2px rgba(212,175,55,0.18) inset, 0 0 14px rgba(212,175,55,0.18);
}

.seat .nameWrap{ width:100%; display:flex; justify-content:center; }
.seat input.name{
  width:100%;
  text-align:center;
  font-size:16px;         /* 防 iOS zoom */
  font-weight:900;
  border:none;
  background:transparent;
  color:var(--text);
  padding:2px 4px;
  outline:none;
  transform: scale(0.82) translateY(5px); /* 視覺縮細, 校字高度 */
  transform-origin:center;
}

/* 分數原大 + 顏色 */
.seat .score{
  font-size:22px;
  font-weight:900;
  line-height:1;

  margin-top:3px; /* 校分數高度 */
}
.score.pos{ color:var(--pos); }
.score.neg{ color:var(--neg); }

/* ✅ 分數動畫（+10 / -20） */
.scoreDelta{
  position:absolute;
  left:50%;
  top:52%;
  transform:translate(-50%,-10%) scale(0.95);
  font-size:14px;
  font-weight:900;
  pointer-events:none;
  opacity:0;
  z-index:6;
  text-shadow:0 2px 12px rgba(0,0,0,0.35);
  animation: floatDelta 900ms ease-out forwards;
}
.scoreDelta.pos{ color:var(--accent); }
.scoreDelta.neg{ color:var(--neg); }
@keyframes floatDelta{
  0%{ opacity:0; transform:translate(-50%,-10%) scale(0.95); }
  15%{ opacity:1; }
  100%{ opacity:0; transform:translate(-50%,-85%) scale(1.05); }
}

/* 被拉針顯示（細字） */
.pullInfo{
  font-size:12px;
  color:var(--sub);
  line-height:1;
  transform: scale(0.88);
  transform-origin:center;
  margin-top:2px;
  min-height:14px;
}

/* 連莊 badge（右上角，👑xN） */
.streakBadge{
  position:absolute;
  top:-10px;
  right:-10px;
  background:rgba(212,175,55,0.95);
  color:#000;
  border-radius:999px;
  padding:2px 8px;
  font-size:12px;
  font-weight:900;
  box-shadow:0 0 10px rgba(212,175,55,0.25);
  display:none;
  z-index:5;
}

/* 斬掣：紅色；同名同視覺大小 */
.slashBtn{
  height:20px;              /* 🔴 高度 */
  width:70%;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:10px;           
  font-weight:900;

  border:none;
  border-radius:8px;
  background:#cc0000;
  color:#fff;

  transform: translateY(-7px);

  padding:0;                /* ⚠️ 一定要 0 */
}
.slashBtn:disabled{ opacity:0.35; }

/* === 真麻雀枱中心：木框 + 雙層框 + 綠絨 === */
.center{
  width:100%;
  height:100%;
  position:relative;
  border-radius:18px;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;

  /* 綠色枱面（唔影響尺寸） */
  background:
    radial-gradient(120% 120% at 50% 45%, rgba(255,255,255,0.08), rgba(0,0,0,0.25) 60%),
    linear-gradient(135deg, #0e4a2a, #07361f);
}

/* 外層木框（木紋） */
.center::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  pointer-events:none;

  /* 木紋：多層漸層疊出紋理 */
  background:
    linear-gradient(90deg,
      rgba(255,255,255,0.06) 0%,
      rgba(0,0,0,0.10) 12%,
      rgba(255,255,255,0.04) 25%,
      rgba(0,0,0,0.12) 38%,
      rgba(255,255,255,0.05) 55%,
      rgba(0,0,0,0.10) 70%,
      rgba(255,255,255,0.03) 100%),
    repeating-linear-gradient(90deg,
      rgba(0,0,0,0.16) 0px,
      rgba(0,0,0,0.16) 2px,
      rgba(255,255,255,0.03) 3px,
      rgba(255,255,255,0.03) 6px),
    linear-gradient(135deg, #5a3a1f, #3b2414 55%, #2a180d);

  /* 只顯示邊框：中間挖空 */
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;

  padding:10px;            /* 木框厚度（想厚啲就加大） */
  box-shadow:
    0 18px 28px rgba(0,0,0,0.35),
    inset 0 0 0 2px rgba(255,255,255,0.10),
    inset 0 0 22px rgba(0,0,0,0.35);
}

/* 內層第二圈框（偏金屬/象牙邊） */
.center::after{
  content:"";
  position:absolute;
  inset:8.5px;              /* 跟上面 padding 對應 */
  border-radius:14px;
  pointer-events:none;

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;

  padding:8px;             /* 第二圈框厚度 */
  background:
    linear-gradient(135deg, rgba(255,255,255,0.22), rgba(0,0,0,0.20)),
    rgba(212,175,55,0.12);

  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.18),
    inset 0 0 18px rgba(0,0,0,0.25);
}

/* 你原本 inner 框：用嚟做「枱面內框」 */
.center .outer{
  position:absolute;
  inset:22%;               /* ✅ 調細/調大：控制內框大小 */
  border:2px solid rgba(255,255,255,0.20);
  border-radius:15px;
  box-shadow:
    inset 0 0 12px rgba(0,0,0,0.25);
}

/* 風位字：貼近啲但唔掂線 */
.wind{
  position:absolute;
  font-size:9px;
  font-weight:900;
  color:#fff;
  opacity:0.9;
  pointer-events:none;
}
.wind.top{ top:16.5px; left:50%; transform:translateX(-50%); }
.wind.bottom{ bottom:17.5px; left:50%; transform:translateX(-50%); }
.wind.left{ left:18.5px; top:50%; transform:translateY(-50%); }
.wind.right{ right:18.5px; top:50%; transform:translateY(-50%); }

/* 中間食胡掣：只框住兩個字 */
.winBtn{
  border:none;
  border-radius:10px;
  padding:8px 12px;
  font-size:12px;
  font-weight:900;
  background:var(--gold);
  color:#000;
  cursor:pointer;
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  z-index:3;
}

.t2BottomRow{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:12px;
}

/* History */
.historyItem{
  padding:10px;
  border-radius:14px;
  background:var(--muted);
  margin-bottom:10px;
}
.historyItem .title{ font-weight:900; }
.historyItem .meta{ font-size:13px; color:var(--sub); margin-top:4px; }

/* ===== Modal ===== */
.modalMask{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:14px;
}
.modal{
  width:min(520px, 100%);
  background:var(--card);
  border-radius:18px;
  box-shadow:0 0 28px rgba(0,0,0,0.35);
  border:1px solid rgba(212,175,55,0.25);
  overflow:hidden;
}
.modalHeader{
  padding:12px 14px 6px 14px;
  text-align:center;
  font-weight:900;
  color:var(--gold);
}
.modalBody{ padding:10px 14px 12px 14px; }

function updatePerItemCalc(id){

/* ================= Tab1：總番 + AI ================= */
function getBaseFan(){
  const base = safeInt($("baseFan")?.value ?? "0", 0);
  return base < 0 ? 0 : base;
}
function getRate(){
  const r = safeInt($("rate")?.value ?? "1", 1);
  return r < 0 ? 0 : r;
}
function updateTotalFan(){
  let total = 0;

  document.querySelectorAll(".fanCheck:checked").forEach(cb=>{
    const fan = safeInt(cb.dataset.fan, 0);
    const id = cb.dataset.id;
    const cntInput = document.querySelector(`.fanCount[data-target="${id}"]`);
    if(cntInput){
      const count = Math.max(safeInt(cntInput.value, 0), 0);
      total += fan * count;
    }else{
      total += fan;
    }
  });

  const times = Math.max(safeInt($("dealer_times")?.value ?? "0", 0), 0);
  const dealerFan = (times > 0) ? (times*2 + 1) : 0;
  const calc = $("dealer_times_calc");
  if(calc) calc.textContent = `${dealerFan}番`;
  total += dealerFan;

  total += getBaseFan();

  $("totalFan").innerText = String(total);

  localStorage.setItem("baseFan", String(getBaseFan()));
  localStorage.setItem("rate", String(getRate()));

  aiSuggest();
  syncFanBadgeToTab2();
}
function aiSuggest(){
  const box = $("aiBox");
  const ids = new Set();
  document.querySelectorAll(".fanCheck:checked").forEach(cb=>ids.add(cb.dataset.id));
  const msgs = [];

  if(ids.has("flower") && ids.has("noflower")) msgs.push(`<span class="warn">⚠️「花」同「無花」唔可以同時勾</span>`);
  if(ids.has("zi") && ids.has("nozi")) msgs.push(`<span class="warn">⚠️「字」同「無字」衝突</span>`);
  if(ids.has("chun1color") && ids.has("hun1color")) msgs.push(`<span class="warn">⚠️「清一色」已包含「混一色」，建議只留清一色</span>`);
  if(ids.has("chunpyun") && ids.has("banpyun")) msgs.push(`<span class="warn">⚠️「全求人」通常涵蓋「半求人」，建議只留全求人</span>`);

  msgs.push(`<span class="ok">ℹ️ 底：${getBaseFan()}番</span>`);
  msgs.push(`<span class="ok">ℹ️ 1番 = $${getRate()}</span>`);

  box.innerHTML = msgs.join("<br>");
}

function saveTab1State(){
  const checks = {};

    checks[cb.dataset.id] = cb.checked ? 1 : 0;
  });
  const counts = {};
  document.querySelectorAll(".fanCount").forEach(inp=>{
    counts[inp.dataset.target] = inp.value;
  });

  const state = {
    checks, counts,
    dealer_times: $("dealer_times")?.value ?? "0",
    baseFan: $("baseFan")?.value ?? "5",
    rate: $("rate")?.value ?? "1",
  };
  localStorage.setItem("tab1_state", JSON.stringify(state));
}
function loadTab1State(){
  const raw = localStorage.getItem("tab1_state");
  if(!raw) return;
  try{
    const s = JSON.parse(raw);
    if(s?.baseFan !== undefined) $("baseFan").value = String(s.baseFan);
    if(s?.rate !== undefined) $("rate").value = String(s.rate);
    if(s?.dealer_times !== undefined && $("dealer_times")) $("dealer_times").value = String(s.dealer_times);

const seatIndexToWind = ["E","N","S","W"]; // seat0->E, seat1->N, seat2->S, seat3->W

/* ================= Tab2：核心狀態 ================= */
let scores = [0,0,0,0];               // per player
let dealerPlayer = 0;                 // playerId
let dealerStreak = [0,0,0,0];         // per player
let playerNames = ["玩家1","玩家2","玩家3","玩家4"]; // ✅ per player

// UI 用：每個 pid 顯示「被拉緊第 N 針」（由 pullPairs 推導）
let pulledNeedle = [0,0,0,0];

let undoStack = [];
let gameHistory = [];

/* seatMap: wind -> playerId */
let seatMap = loadSeatMap(); // {E,S,W,N}

/* =========================================================
   ✅ 新版：多條「拉」同時存在（pair-based）
   pullPairs key: "puller>pulled"
   value: { puller, pulled, fan, needles, ts }
========================================================= */
let pullPairs = {}; // Record<string, {puller:number, pulled:number, fan:number, needles:number, ts:number}>

function pairKey(puller, pulled){ return `${puller}>${pulled}`; }
function clone(obj){ return JSON.parse(JSON.stringify(obj)); }

function getPlayerName(pid){
  const v = (playerNames[pid] ?? "").trim();
  return v ? v : `玩家${pid+1}`;
}

function syncFanBadgeToTab2(){
  const total = safeInt($("totalFan")?.innerText ?? "0", 0);
  const badge = $("t2FanBadge");
  if(badge) badge.textContent = `本局番數：${total}`;
}

/* ===== pullPairs helpers ===== */
function ensurePair(puller, pulled, baseFan){
  const k = pairKey(puller, pulled);
  if(!pullPairs[k]){
    pullPairs[k] = { puller, pulled, fan: baseFan, needles: 1, ts: Date.now() };
    return pullPairs[k];
  }
  const cur = pullPairs[k];
  const nextFan = ceilUp(cur.fan * 1.5 + baseFan);
  pullPairs[k] = { puller, pulled, fan: nextFan, needles: (cur.needles||0) + 1, ts: Date.now() };
  return pullPairs[k];
}
function getPairsWherePulledIs(pid){
  const out = [];
  for(const k in pullPairs){
    const p = pullPairs[k];
    if(p && p.pulled === pid) out.push(p);
  }
  return out;
}
function deletePair(puller, pulled){
  const k = pairKey(puller, pulled);
  delete pullPairs[k];
}
function clearAllPairs(){
  pullPairs = {};
  syncPulledNeedleFromPairs();
}
function syncPulledNeedleFromPairs(){
  pulledNeedle = [0,0,0,0];
  for(let pid=0; pid<4; pid++){
    const incoming = getPairsWherePulledIs(pid);
    if(!incoming.length){
      pulledNeedle[pid] = 0;
    }else{
      let maxN = 0;
      for(const p of incoming) maxN = Math.max(maxN, safeInt(p.needles,0));
      pulledNeedle[pid] = maxN;
    }
  }
}

/* ================= Tab2：render seats reflect player data ===== */
function renderAllTab2(){
  syncPulledNeedleFromPairs();

  for(let seatIdx=0; seatIdx<4; seatIdx++){
    const pid = getPidAtSeatIndex(seatIdx);

    const nameEl = $("n"+seatIdx);
    if(nameEl){
      if(document.activeElement !== nameEl){
        nameEl.value = getPlayerName(pid);
      }
    }

    const scEl = $("sc"+seatIdx);
    if(scEl){
      const v = safeInt(scores[pid], 0);
      scEl.textContent = String(v);
      scEl.classList.remove("pos","neg");
      if(v > 0) scEl.classList.add("pos");
      else if(v < 0) scEl.classList.add("neg");
    }

    const piEl = $("pi"+seatIdx);
    if(piEl){
      const incoming = getPairsWherePulledIs(pid);
      if(!incoming.length){
        piEl.textContent = "";
      }else if(incoming.length === 1){
        const p = incoming[0];
        piEl.textContent = `被拉緊第 ${safeInt(p.needles,0)} 針`;
      }else{
        // 唔改 UI 結構，只係字：顯示「幾條」+ 最高針
        let maxN = 0;
        for(const p of incoming) maxN = Math.max(maxN, safeInt(p.needles,0));
        piEl.textContent = `被拉 ${incoming.length} 條｜最高第 ${maxN} 針`;
      }
    }

    const seatEl = $("seat"+seatIdx);
    if(seatEl) seatEl.classList.toggle("dealer", pid === dealerPlayer);

    const st = $("st"+seatIdx);
    if(st){
      if(pid === dealerPlayer && (dealerStreak[dealerPlayer]||0) > 0){
        st.textContent = `👑x${dealerStreak[dealerPlayer]}`;
        st.style.display = "";
      }else{
        st.style.display = "none";
      }
    }

    const sl = $("sl"+seatIdx);
    if(sl){
      // ✅ 斬：只要「此玩家」有任何一條 incoming 拉係 3/6/9... 就可斬
      const incoming = getPairsWherePulledIs(pid);
      const canSlash = incoming.some(p => {
        const n = safeInt(p.needles,0);
        return n > 0 && n % 3 === 0;
      });
      sl.disabled = !canSlash;
    }
  }
}

/* Undo */
function pushUndoSnapshot(){
  undoStack.push(clone({
    scores, dealerPlayer, dealerStreak,
    playerNames, pulledNeedle,
    history: gameHistory,
    seatMap,
    pullPairs
  }));
  if(undoStack.length > 80) undoStack.shift();
}
function restoreSnapshot(snap){
  if(!snap) return;
  scores = snap.scores || [0,0,0,0];
  dealerPlayer = snap.dealerPlayer ?? 0;
  dealerStreak = snap.dealerStreak || [0,0,0,0];
  playerNames = snap.playerNames || ["玩家1","玩家2","玩家3","玩家4"];
  pulledNeedle = snap.pulledNeedle || [0,0,0,0];
  gameHistory = snap.history || [];
  seatMap = snap.seatMap || {E:0,S:2,W:3,N:1};
  pullPairs = snap.pullPairs || {};

  saveSeatMap(seatMap);

  renderAllTab2();
  renderHistory();
  syncFanBadgeToTab2();
  saveTab2State();
}
function undoLast(){
  if(undoStack.length === 0){ alert("無得撤銷"); return; }
  const snap = undoStack.pop();
  restoreSnapshot(snap);
}

/* ✅ 斬：此玩家所有 incoming 拉一刀清晒 */
function slashSeat(seatIdx){
  const pid = getPidAtSeatIndex(seatIdx);
  const incoming = getPairsWherePulledIs(pid);
  const canSlash = incoming.some(p=>{
    const n = safeInt(p.needles,0);
    return n > 0 && n % 3 === 0;
  });
  if(!canSlash) return;

  pushUndoSnapshot();

  // 清晒所有「別人拉緊 pid」嘅 pair
  for(const p of incoming){
    deletePair(p.puller, p.pulled);
  }
  $("t2_info").textContent = `⚔️ ${getPlayerName(pid)} 已斬（清拉）`;

  renderAllTab2();
  saveTab2State();
}

/* ======================= ✅ 拉 / 劈 / 引撆 / 清拉：結算核心 ======================= */

function applyTransfer(fromPid, toPid, fan, rate, deltas){
  const amt = fan * rate;
  deltas[fromPid] -= amt;
  deltas[toPid] += amt;
  return amt;
}
function applyHalfTransferFloor(fromPid, toPid, fan, rate, deltas){
  const halfFan = Math.floor(fan / 2);
  const amt = halfFan * rate;
  deltas[fromPid] -= amt;
  deltas[toPid] += amt;
  return { halfFan, amt };
}

/*
  ✅ 清拉觸發點（你 confirm 嘅規則）：
  - 只要「被拉者（pulled）」成為今局贏家，就要同佢所有 puller 結算並清拉
    - 若 pulled 食返 puller（即 loser==puller 且非自摸）=> 劈（半數）+ 清拉
    - 否則（pulled 自摸 / 食第三家）=> 引撆（全數）+ 清拉
*/
function settleClearForWinner(winnerPid, loserPidOrNull, isSelf, deltas, notes){
  const incoming = getPairsWherePulledIs(winnerPid);
  if(!incoming.length) return;

  for(const pair of incoming){
    const puller = pair.puller;
    const pulled = pair.pulled; // == winnerPid
    const fan = safeInt(pair.fan, 0);
    const rate = getRate();

    if(fan <= 0) {
      deletePair(puller, pulled);
      continue;
    }

    const isPik = (!isSelf && typeof loserPidOrNull === "number" && loserPidOrNull === puller);
    if(isPik){
      const r = applyHalfTransferFloor(pulled, puller, fan, rate, deltas);
      notes.push(`劈：${getPlayerName(pulled)} → ${getPlayerName(puller)} 半數拉番${r.halfFan}（$${r.amt}）清拉`);
    }else{
      const amt = applyTransfer(pulled, puller, fan, rate, deltas);
      notes.push(`引撆：${getPlayerName(pulled)} → ${getPlayerName(puller)} 全數拉番${fan}（$${amt}）清拉`);
    }

    // ✅ 無論劈/引撆都清拉
    deletePair(puller, pulled);
  }
}

/*
  ✅ 主結算：一局 (單胡 / 自摸)
  - 先做「清拉結算」（如果贏家係某些人嘅被拉者）
  - 再做「正常食胡/自摸」落分
  - 同時為本局輸家建立/升針（贏家會拉輸家）
*/
function settleRound(winnerPid, loserPid, isSelf){
  const baseFan = safeInt($("totalFan")?.innerText ?? "0", 0);
  if(baseFan <= 0){
    alert("Tab1 總番數係 0，先去 Tab1 勾番");
    return;
  }
  const rate = getRate();

  // 今局 losers
  const losers = isSelf ? [0,1,2,3].filter(p=>p!==winnerPid) : [loserPid];

  // deltas
  const deltas = [0,0,0,0];
  const notes = [];

  // 1) ✅ 先處理：如果 winner 係「被拉者」，就同所有 puller 清拉結算（劈/引撆）
  settleClearForWinner(winnerPid, isSelf ? null : loserPid, isSelf, deltas, notes);

  // 2) ✅ 正常食胡/自摸：但「每個 loser」都要用自己 pair 嘅拉番（因為自摸同時拉三家）
  //    規則：贏家都會拉輸家（食胡/自摸都會）
  //    settleFan = 開拉/升針後嗰個 fan
  const perSettle = []; // for info/log
  for(const lp of losers){
    const pair = ensurePair(winnerPid, lp, baseFan);
    const settleFan = safeInt(pair.fan, baseFan);
    const amount = settleFan * rate;

    if(isSelf){
      deltas[lp] -= amount;
      deltas[winnerPid] += amount;
      perSettle.push(`${getPlayerName(lp)}：第${pair.needles}針→拉番${settleFan}（$${amount}）`);
    }else{
      deltas[lp] -= amount;
      deltas[winnerPid] += amount;
      perSettle.push(`第${pair.needles}針→拉番${settleFan}（$${amount}）`);
    }
  }

  // 3) 落分 + 動畫
  for(let p=0;p<4;p++) scores[p] += deltas[p];
  for(let p=0;p<4;p++) showScoreDeltaForPid(p, deltas[p]);

  // 4) 莊/連莊（保持你原本：贏家做新莊）
  if(winnerPid === dealerPlayer){
    dealerStreak[dealerPlayer] = (dealerStreak[dealerPlayer]||0) + 1;
  }else{
    dealerStreak[dealerPlayer] = 0;
    dealerPlayer = winnerPid;
    dealerStreak[dealerPlayer] = 1;
  }

  // 5) Info
  const winName = getPlayerName(winnerPid);
  const typeTxt = isSelf ? "自摸" : `食胡（食 ${getPlayerName(loserPid)}）`;

  const normalLine = isSelf
    ? `本局番：${baseFan}｜1番=$${rate}<br>拉（自摸三家）：${perSettle.join("｜")}`
    : `本局番：${baseFan}｜1番=$${rate}｜${perSettle[0]}`;

  const extraLine = notes.length ? (`<br>` + notes.map(x=>`｜${x}`).join("<br>")) : "";

  $("t2_info").innerHTML =
    `✅ ${winName} ${typeTxt}<br>` +
    `${normalLine}` +
    `${extraLine}`;

  gameHistory.push({
    kind:"win",
    ts: Date.now(),
    winner: winnerPid,
    loser: isSelf ? null : loserPid,
    isSelf,
    baseFan,
    rate,
    perSettle: clone(perSettle),
    clearNotes: clone(notes),
    deltas: clone(deltas),
    pullPairsAfter: clone(pullPairs)
  });

  renderAllTab2();
  renderHistory();
  saveTab2State();
}

/* History */
function renderHistory(){
  const box = $("historyList");
  if(!box) return;
  if(!gameHistory.length){
    box.innerHTML = "（未有紀錄）";
    return;
  }

  box.innerHTML = gameHistory.slice().reverse().map((r, idxFromEnd)=>{
    const roundNo = gameHistory.length - idxFromEnd;
    if(r.kind === "yin"){
      return `
        <div class="historyItem">
          <div class="title">#${roundNo} 陰蟄錢：${r.yinType} → ${getPlayerName(r.player)}</div>
          <div class="meta">${fmtTime(r.ts)}｜已按規則加減分</div>
        </div>
      `;
    }

    const winName = getPlayerName(r.winner);
    const typeTxt = r.isSelf ? "自摸" : `食胡（食 ${getPlayerName(r.loser)}）`;

    const extra = [
      `本局番${r.baseFan}`,
      `1番=$${r.rate}`,
      (Array.isArray(r.perSettle) ? r.perSettle.join("｜") : ""),
      (Array.isArray(r.clearNotes) && r.clearNotes.length ? `清拉：${r.clearNotes.join("｜")}` : "")
    ].filter(Boolean).join("｜");

    return `
      <div class="historyItem">
        <div class="title">第 ${roundNo} 局：${winName} ${typeTxt}</div>
        <div class="meta">${fmtTime(r.ts)}｜${extra}</div>
      </div>
    `;
  }).join("");
}

async function copyHistory(){
  if(!gameHistory.length){ alert("無紀錄可以複製"); return; }
  const lines = gameHistory.map((r,idx)=>{
    const no = idx+1;
    if(r.kind === "yin"){
      return `#${no} 陰蟄錢：${r.yinType} → ${getPlayerName(r.player)}｜已按規則加減分`;
    }
    const winName = getPlayerName(r.winner);
    const typeTxt = r.isSelf ? "自摸" : `食胡（食 ${getPlayerName(r.loser)}）`;
    const extra = [
      `本局番${r.baseFan}`,
      `1番=$${r.rate}`,
      (Array.isArray(r.perSettle) ? r.perSettle.join("｜") : ""),
      (Array.isArray(r.clearNotes) && r.clearNotes.length ? `清拉：${r.clearNotes.join("｜")}` : "")
    ].filter(Boolean).join("｜");
    return `#${no}：${winName} ${typeTxt}｜${extra}`;
  }).join("\n");

  try{
    await navigator.clipboard.writeText(lines);
    alert("已複製到剪貼簿");
  }catch(e){
    prompt("iPhone 有時限制剪貼簿，複製下面文字：", lines);
  }
}
function clearHistory(){
  if(!confirm("確定清晒紀錄？")) return;
  pushUndoSnapshot();
  gameHistory = [];
  renderHistory();
  saveTab2State();
}

/* 食胡 modal */
let modalWin = new Set();
let modalLose = null;
let modalSelf = false;

function openWinModal(){
  modalWin = new Set();
  modalLose = null;
  modalSelf = false;
  $("multiChk").checked = false;
  renderWinModal();
  $("winMask").style.display = "flex";
}
function closeWinModal(){ $("winMask").style.display = "none"; }

function renderWinModal(){
  const multi = $("multiChk").checked;
  const winList = $("winList");
  const loseList = $("loseList");
  winList.innerHTML = "";
  loseList.innerHTML = "";

  for(let p=0;p<4;p++){
    const b = document.createElement("button");
    b.type = "button";
    b.className = "pickBtn";
    b.textContent = getPlayerName(p);
    b.classList.toggle("active", modalWin.has(p));
    b.onclick = ()=>{
      if(!multi){
        modalWin = new Set([p]);
      }else{
        if(modalWin.has(p)) modalWin.delete(p);
        else modalWin.add(p);
      }
      if(modalLose !== null && modalWin.has(modalLose)) modalLose = null;

      if(modalWin.size === 0){
        modalSelf = false;
        modalLose = null;
      }
      renderWinModal();
    };
    winList.appendChild(b);
  }

  if(modalWin.size > 0){
    const sb = document.createElement("button");
    sb.type = "button";
    sb.className = "selfBtn";
    sb.textContent = "自摸";
    sb.classList.toggle("active", modalSelf);
    sb.onclick = ()=>{
      modalSelf = !modalSelf;
      if(modalSelf) modalLose = null;
      renderWinModal();
    };
    loseList.appendChild(sb);
  }

  for(let p=0;p<4;p++){
    if(modalWin.has(p)) continue;
    const b = document.createElement("button");
    b.type = "button";
    b.className = "pickBtn";
    b.textContent = getPlayerName(p);
    b.classList.toggle("active", modalLose === p);
    if(modalSelf) b.classList.add("disabled");
    b.onclick = ()=>{
      if(modalSelf) return;
      modalLose = p;
      renderWinModal();
    };
    loseList.appendChild(b);
  }

  if(!multi && modalWin.size > 1){
    $("winHint").textContent = "⚠️ 未剔一炮多響：食胡玩家只可揀一個";
  }else{
    $("winHint").textContent = "";
  }
}

function confirmWinModal(){
  const multi = $("multiChk").checked;
  if(modalWin.size === 0){ alert("未揀食胡玩家"); return; }
  if(!multi && modalWin.size !== 1){ alert("未剔一炮多響：食胡玩家只可揀一個"); return; }

  pushUndoSnapshot();

  if(modalSelf){
    if(modalWin.size !== 1){
      alert("自摸暫時只可揀一個食胡玩家");
      return;
    }
    const w = [...modalWin][0];
    settleRound(w, null, true);
    closeWinModal();
    return;
  }

  if(modalLose === null){
    alert("未揀出銃玩家（或者改用自摸）");
    return;
  }

  if(modalWin.size === 1){
    const w = [...modalWin][0];
    settleRound(w, modalLose, false);
    closeWinModal();
    return;
  }

  // =================== ✅ 一炮多響（保持 UI 同操作；邏輯改成「每個贏家都會拉出銃者」 + 「每個贏家如果係被拉者就清拉」） ===================
  const baseFan = safeInt($("totalFan")?.innerText ?? "0", 0);
  if(baseFan <= 0){
    alert("Tab1 總番數係 0，先去 Tab1 勾番");
    return;
  }
  const rate = getRate();
  const winners = [...modalWin];
  const loser = modalLose;

  const deltas = [0,0,0,0];
  const notes = [];

  // 1) 清拉：任何 winner 只要係被拉者，就同其所有 puller 清拉（劈/引撆）
  for(const w of winners){
    settleClearForWinner(w, loser, false, deltas, notes); // 多響係「食胡」，唔係自摸
  }

  // 2) 正常多響：出銃者賠 N 份（每份 = 該 winner 對 loser 目前拉番後嘅金額）
  const perSettle = [];
  for(const w of winners){
    const pair = ensurePair(w, loser, baseFan);
    const settleFan = safeInt(pair.fan, baseFan);
    const amt = settleFan * rate;

    deltas[loser] -= amt;
    deltas[w] += amt;

    perSettle.push(`${getPlayerName(w)}：第${pair.needles}針→拉番${settleFan}（$${amt}）`);
  }

  // 落分 + 動畫
  for(let p=0;p<4;p++) scores[p] += deltas[p];
  for(let p=0;p<4;p++) showScoreDeltaForPid(p, deltas[p]);

  // 莊家更新：保持你原本做法（第一個 winner 當 leader）
  const leader = winners[0];
  if(leader === dealerPlayer){
    dealerStreak[dealerPlayer] = (dealerStreak[dealerPlayer]||0) + 1;
  }else{
    dealerStreak[dealerPlayer] = 0;
    dealerPlayer = leader;
    dealerStreak[dealerPlayer] = 1;
  }

  const winNames = winners.map(getPlayerName).join("、");
  $("t2_info").innerHTML =
    `✅ ${winNames} 一炮多響（食 ${getPlayerName(loser)}）<br>`+
    `本局番：${baseFan}｜1番=$${rate}<br>`+
    `拉（多響）：${perSettle.join("｜")}`+
    (notes.length ? (`<br>` + notes.map(x=>`｜${x}`).join("<br>")) : "");

  gameHistory.push({
    kind:"win",
    ts: Date.now(),
    winner: leader,
    loser,
    isSelf:false,
    baseFan,
    rate,
    multiWinners: clone(winners),
    perSettle: clone(perSettle),
    clearNotes: clone(notes),
    deltas: clone(deltas),
    pullPairsAfter: clone(pullPairs)
  });

  renderAllTab2();
  renderHistory();
  saveTab2State();

  closeWinModal();
}

/* 起莊 modal */

function openDealerModal(){

/* 執位（✅ 真執位：seatMap 影響整個 Tab2 顯示，分數自動同步） */
function loadSeatMap(){
  const raw = localStorage.getItem("seatMap");
  if(!raw) return {E:0,S:2,W:3,N:1};
  try{
    const s = JSON.parse(raw);
    return {E:s.E??0,S:s.S??2,W:s.W??3,N:s.N??1};
  }catch(e){
    return {E:0,S:2,W:3,N:1};
  }
}
function saveSeatMap(m){ localStorage.setItem("seatMap", JSON.stringify(m)); }

function openSeatModal(){
  const body = $("seatBody");
  body.innerHTML = "";
  const winds = [
    {k:"E", label:"東"},
    {k:"S", label:"南"},
    {k:"W", label:"西"},
    {k:"N", label:"北"},
  ];
  const cur = {...seatMap};

  winds.forEach(w=>{
    const row = document.createElement("div");
    row.className = "seatRow";

    const tag = document.createElement("div");
    tag.className = "windTag";
    tag.textContent = w.label;

    const sel = document.createElement("select");
    sel.className = "input";
    sel.dataset.wind = w.k;

    for(let p=0;p<4;p++){
      const o = document.createElement("option");
      o.value = String(p);
      o.textContent = getPlayerName(p);
      sel.appendChild(o);
    }
    sel.value = String(cur[w.k] ?? 0);

    sel.addEventListener("change", ()=>{
      const want = safeInt(sel.value, 0);
      for(const other of winds){
        if(other.k === w.k) continue;
        const otherSel = body.querySelector(`select[data-wind="${other.k}"]`);
        if(!otherSel) continue;
        if(safeInt(otherSel.value, -1) === want){
          otherSel.value = String(cur[w.k] ?? 0);
          break;
        }
      }
      winds.forEach(xx=>{
        const s = body.querySelector(`select[data-wind="${xx.k}"]`);
        cur[xx.k] = safeInt(s.value, 0);
      });
    });

    row.appendChild(tag);
    row.appendChild(sel);
    body.appendChild(row);
  });

  $("seatMask").style.display = "flex";
  window.__seatDraft = cur;
}
function closeSeatModal(){ $("seatMask").style.display = "none"; window.__seatDraft = null; }
function confirmSeatModal(){
  pushUndoSnapshot();
  const draft = window.__seatDraft;
  if(draft){
    seatMap = {E:draft.E, S:draft.S, W:draft.W, N:draft.N};
    saveSeatMap(seatMap);
  }
  $("t2_info").textContent = "🪑 已執位）";
  renderAllTab2();
  saveTab2State();
  closeSeatModal();
}

/* ✅ 收陰蟄錢 modal */
const yinTypes = ["追殺","暗槓","花","草","詐胡"];
let yinTypeSel = null;
let yinPlayerSel = null;

function openYinModal(){
  yinTypeSel = null;
  yinPlayerSel = null;
  renderYinModal();
  $("yinMask").style.display = "flex";
}
function closeYinModal(){ $("yinMask").style.display = "none"; }

function renderYinModal(){
  const lt = $("yinTypeList");
  const rp = $("yinPlayerList");
  lt.innerHTML = "";
  rp.innerHTML = "";

  yinTypes.forEach((t)=>{
    const b = document.createElement("button");
    b.type = "button";
    b.className = "pickBtn";
    b.textContent = t;
    b.classList.toggle("active", yinTypeSel === t);
    b.onclick = ()=>{
      yinTypeSel = t;
      renderYinModal();
    };
    lt.appendChild(b);
  });

  for(let p=0;p<4;p++){
    const b = document.createElement("button");
    b.type = "button";
    b.className = "pickBtn";
    b.textContent = getPlayerName(p);
    b.classList.toggle("active", yinPlayerSel === p);
    b.onclick = ()=>{
      yinPlayerSel = p;
      renderYinModal();
    };
    rp.appendChild(b);
  }
}

function applyYinMoney(type, player){
  const deltas = [0,0,0,0];
  const applyAll = (selDelta, otherDelta)=>{
    for(let p=0;p<4;p++){
      deltas[p] += (p === player) ? selDelta : otherDelta;
    }
  };

  if(type === "追殺") applyAll(-15, +5);
  else if(type === "詐胡") applyAll(-90, +30);
  else if(type === "花" || type === "暗槓") applyAll(+15, -5);
  else if(type === "草") applyAll(+9, -3);

  for(let p=0;p<4;p++) scores[p] += deltas[p];
  return deltas;
}

function confirmYinModal(){
  if(!yinTypeSel){ alert("未揀陰蟄錢類型"); return; }
  if(typeof yinPlayerSel !== "number"){ alert("未揀玩家"); return; }

  pushUndoSnapshot();

  const deltas = applyYinMoney(yinTypeSel, yinPlayerSel);
  for(let p=0;p<4;p++) showScoreDeltaForPid(p, deltas[p]);

  $("t2_info").innerHTML = `💰 陰蟄錢：${yinTypeSel} → ${getPlayerName(yinPlayerSel)}`;

  gameHistory.push({
    kind:"yin",
    ts: Date.now(),
    yinType: yinTypeSel,
    player: yinPlayerSel
  });

  renderAllTab2();
  renderHistory();
  saveTab2State();
  closeYinModal();
}

/* Tab2 storage */
function saveTab2State(){
  const state = {
    scores, dealerPlayer, dealerStreak,
    playerNames, pulledNeedle,
    history: gameHistory,
    seatMap,
    pullPairs
  };
  localStorage.setItem("tab2_state", JSON.stringify(state));
}
function loadTab2State(){
  const raw = localStorage.getItem("tab2_state");
  if(!raw) return;
  try{
    const s = JSON.parse(raw);
    if(Array.isArray(s?.scores)) scores = s.scores.map(x=>safeInt(x,0));
    dealerPlayer = s.dealerPlayer ?? 0;
    if(Array.isArray(s?.dealerStreak)) dealerStreak = s.dealerStreak.map(x=>safeInt(x,0));
    if(Array.isArray(s?.playerNames)) playerNames = s.playerNames.map((x,i)=> (String(x||"").trim() || `玩家${i+1}`));
    if(Array.isArray(s?.pulledNeedle)) pulledNeedle = s.pulledNeedle.map(x=>safeInt(x,0));
    if(Array.isArray(s?.history)) gameHistory = s.history;
    if(s?.seatMap){
      seatMap = {E:s.seatMap.E??seatMap.E, S:s.seatMap.S??seatMap.S, W:s.seatMap.W??seatMap.W, N:s.seatMap.N??seatMap.N};
      saveSeatMap(seatMap);
    }
    if(s?.pullPairs && typeof s.pullPairs === "object"){
      pullPairs = s.pullPairs;
    }else{
      pullPairs = {};
    }
  }catch(e){}
}

/* bind events */
function bindEvents(){
  $("themeBtn").addEventListener("click", ()=>setTheme(!document.body.classList.contains("white")));
  $("tabBtn1").addEventListener("click", ()=>setTab(1));
  $("tabBtn2").addEventListener("click", ()=>setTab(2));

  $("toTab2Btn").addEventListener("click", ()=>setTab(2));

  $("baseFan").addEventListener("input", ()=>{ updateTotalFan(); saveTab1State(); });
  $("rate").addEventListener("input", ()=>{ updateTotalFan(); saveTab1State(); });
  $("resetBaseBtn").addEventListener("click", ()=>{
    $("baseFan").value = "5";
    updateTotalFan();
    saveTab1State();
  });
  $("clearBtn").addEventListener("click", clearTab1All);

  // ✅ 名字：輸入係「座位 input」但更新係「playerNames[pid]」
  for(let seatIdx=0; seatIdx<4; seatIdx++){
    const el = $("n"+seatIdx);
    el.addEventListener("input", ()=>{
      const pid = getPidAtSeatIndex(seatIdx);
      playerNames[pid] = (el.value ?? "").slice(0,12);
      saveTab2State();

      if($("winMask").style.display === "flex") renderWinModal();
      if($("dealerMask").style.display === "flex") openDealerModal();
      if($("seatMask").style.display === "flex") openSeatModal();
      if($("yinMask").style.display === "flex") renderYinModal();
      renderHistory();
    });
  }

  $("winBtn").addEventListener("click", openWinModal);
  $("multiChk").addEventListener("change", ()=>{
    if(!$("multiChk").checked && modalWin.size > 1){
      const first = [...modalWin][0];
      modalWin = new Set([first]);
    }
    renderWinModal();
  });
  $("winCancelBtn").addEventListener("click", closeWinModal);
  $("winOkBtn").addEventListener("click", confirmWinModal);

  $("dealerBtn").addEventListener("click", openDealerModal);
  $("dealerCancelBtn").addEventListener("click", closeDealerModal);
  $("dealerOkBtn").addEventListener("click", confirmDealerModal);

  $("seatBtn").addEventListener("click", openSeatModal);
  $("seatCancelBtn").addEventListener("click", closeSeatModal);
  $("seatOkBtn").addEventListener("click", confirmSeatModal);

  $("yinBtn").addEventListener("click", openYinModal);
  $("yinCancelBtn").addEventListener("click", closeYinModal);
  $("yinOkBtn").addEventListener("click", confirmYinModal);

  // ✅ 斬掣：按「座位」斬該座位玩家（清拉）
  for(let seatIdx=0; seatIdx<4; seatIdx++){
    $("sl"+seatIdx).addEventListener("click", ()=>slashSeat(seatIdx));
  }

  $("undoBtn").addEventListener("click", undoLast);
  $("resetBtn").addEventListener("click", ()=>{
    pushUndoSnapshot();
    scores = [0,0,0,0];
    clearAllPairs();
    dealerStreak = [0,0,0,0];
    $("t2_info").textContent = "🧹 已清零";
    renderAllTab2();
    saveTab2State();
  });

  $("copyHistoryBtn").addEventListener("click", copyHistory);
  $("clearHistoryBtn").addEventListener("click", clearHistory);
}

/* init */
document.addEventListener("DOMContentLoaded", ()=>{
  loadTheme();
  renderFanList();
  bindEvents();

  loadTab1State();
  updateTotalFan();

  seatMap = loadSeatMap();

  loadTab2State();
  renderAllTab2();
  renderHistory();
  syncFanBadgeToTab2();

  setTab(1);
});
</script>
