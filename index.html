  <style>
:root{
  --bg:#0f0f0f;
  --card:#1c1c1c;
  --muted:#2a2a2a;
  --text:#ffffff;
  --sub:#bdbdbd;
  --gold:#d4af37;
  --accent:#00ff88;
  --danger:#cc0000;
  --shadow: rgba(212,175,55,0.12);
  --line: rgba(128,128,128,0.25);

  --pos:#1f8a3a;
  --neg:#ff3b30;
}
*{ box-sizing:border-box; }
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  padding-bottom:180px;
  -webkit-text-size-adjust:100%;
}
body.white{
  --bg:#f5f5f5;
  --card:#ffffff;
  --muted:#e8e8e8;
  --text:#000000;
  --sub:#333333;

  /* ✅ (f) 白色 mode 主色改藍（iOS feel），黑色 mode 不變 */
  --gold:#0a84ff;

  --accent:#007aff;
  --danger:#ff3b30;

  --shadow: rgba(0,0,0,0.06);
  --line: rgba(0,0,0,0.12);
  --pos:#1f8a3a;
  --neg:#ff3b30;
}

/* ===== 底/幾錢 UI ===== */
.baseRow{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
.baseLeft{
  display:flex;
  align-items:center;
  gap:10px;
}
.baseInputWrap{
  display:flex;
  align-items:center;
  gap:6px;

  background:var(--muted);
  border-radius:999px;
  padding:4px 8px;

  border:1px solid var(--line);
}
#baseFan{
  width:50px !important;
  max-width:50px !important;
  flex:0 0 auto !important;
  padding:6px 4px;
  border:none;
  background:transparent;
  color:var(--gold);
  text-align:center;
  font-weight:900;
  outline:none;
  text-align:center;
  text-align-last:center;
  font-size:16px;
}
.miniNum{
  width:50px !important;
  text-align:center;
  text-align-last:center;
  color: var(--gold);
  font-weight:900;
  font-size:16px;
  transform: translateY(-0.75px);
  border:none !important;
  outline:none !important;
  padding:0 !important;
  background:transparent !important;
  border-radius:0 !important;
  -webkit-appearance:none;
}
.baseInputWrap span{
  font-size:12px;
  color:var(--sub);
  font-weight:700;
}
#resetBaseBtn{
  padding:6px 10px;
  font-size:13px;
  border-radius:10px;
}

/* Fixbar右掣icon */
#toTab2Btn .iosSvgIcon{ width:20px; height:20px; }
#toTab2Btn svg{ width:22px; height:22px; }
#toTab2Btn .iosChevronR{ width:20px; height:20px; display:block; transform: translateY(-1.5px); }
#toTab2Btn .iosChevronR path{
  fill:none; stroke:currentColor; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round;
}

/* iOS 防 zoom */
input, select, button, textarea{ font-size:16px; }

.container{ padding:0 14px; max-width:980px; margin:0 auto; }
header{
  padding:14px 14px 8px 14px;
  text-align:center;
  font-size:20px;
  font-weight:900;
  letter-spacing:0.5px;
}
.topbar{
  display:flex;
  gap:10px;
  justify-content:center;
  align-items:center;
  padding:0 14px 12px 14px;
  flex-wrap:wrap;
}
.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:var(--muted);
  color:var(--text);
  font-weight:900;
  font-size:13px;
}
.badge.gold{ background:rgba(212,175,55,0.18); color:var(--gold); }
body.white .badge.gold{ background:rgba(10,132,255,0.14); }

.bigBadge{
  font-size:20px;
  padding:12px 18px;
  box-shadow:0 0 12px rgba(212,175,55,0.25);
}
body.white .bigBadge{ box-shadow:0 0 12px rgba(10,132,255,0.18); }

.btn{
  border:none;
  border-radius:999px;
  padding:10px 14px;
  font-weight:900;
  background:var(--gold);
  color:#000;
  cursor:pointer;
  -webkit-tap-highlight-color: transparent;
}
body.white .btn{ color:#fff; } /* iOS blue look */
.btn.secondary{ background:var(--muted); color:var(--text); font-weight:800; }
.btn.danger{ background:var(--danger); color:#fff; }
.btn.smallBtn{
  padding: 6px 10px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1;
}

.tabs{
  display:flex;
  gap:8px;
  padding:0 14px 14px 14px;
  max-width:980px;
  margin:0 auto;
}
.tabBtn{
  flex:1;
  border:none;
  border-radius:14px;
  padding:12px 10px;
  font-weight:900;
  background:var(--muted);
  color:var(--sub);
  cursor:pointer;
  -webkit-tap-highlight-color: transparent;
}
.tabBtn.active{ background:var(--gold); color:#000; }
body.white .tabBtn.active{ color:#fff; }

.card{
  background:var(--card);
  border-radius:18px;
  padding:14px;
  margin-bottom:14px;
  box-shadow: 0 0 22px var(--shadow);
}
.flatCard{ box-shadow:none; background:var(--card); }

h2{ margin:0 0 10px 0; color:var(--gold); font-size:18px; }
.small{ color:var(--sub); font-size:13px; line-height:1.6; }
.m{ font-size:14px; color:var(--sub); }
.xs{ font-size:12px; color:var(--sub); }
.xxs{ font-size:11px; color:var(--sub); }
.xxxs{ font-size:7px; color:var(--sub); }

.row{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
.kv{ display:flex; justify-content:space-between; gap:10px; font-size:13px; color:var(--sub); margin-top:6px; }

.input, select{
  border:1px solid rgba(128,128,128,0.35);
  background:transparent;
  color:var(--text);
  border-radius:12px;
  padding:10px 12px;
  outline:none;
  max-width:100%;
}
body.white .input, body.white select{ border:1px solid rgba(0,0,0,0.2); }
select{
  appearance:none;
  -webkit-appearance:none;
  background-image:
    linear-gradient(45deg, transparent 50%, var(--sub) 50%),
    linear-gradient(135deg, var(--sub) 50%, transparent 50%);
  background-position:
    calc(100% - 18px) calc(50% - 2px),
    calc(100% - 12px) calc(50% - 2px);
  background-size:6px 6px, 6px 6px;
  background-repeat:no-repeat;
  padding-right:34px;
}
.input.num{ width:60px; }
@media (max-width:420px){
  .input.num{ width:100%; }
}

.table{ width:100%; border-collapse:collapse; margin-top:8px; font-size:14px; }
.table td{ padding:8px 6px; border-bottom:1px solid var(--line); }
.tRight{ text-align:right; }
.strong{ font-weight:900; }

details{
  background:var(--muted);
  border-radius:14px;
  padding:10px 10px;
  margin:10px 0;
}
details > summary{
  cursor:pointer;
  font-weight:900;
  color:var(--text);
  list-style:none;
  display:flex;
  align-items:center;
  gap:8px;
}
details > summary::-webkit-details-marker{ display:none; }
summary::before{
  content:"▶";
  display:inline-block;
  width:18px;
  transition:0.2s;
  color:var(--gold);
}
details[open] summary::before{ transform:rotate(90deg); }
.sumGold{ color:var(--gold); font-weight:900; }

.checkline{
  display:flex;
  align-items:center;
  gap:10px;
  padding:7px 4px;
  border-bottom:1px dashed var(--line);
}
.checkline:last-child{ border-bottom:none; }
.checkline label{ flex:1; cursor:pointer; }
.checkline .fan{ color:var(--gold); font-weight:900; }
.checkline.active{
  background:rgba(212,175,55,0.12);
  border-radius:10px;
  box-shadow:0 0 10px rgba(212,175,55,0.12);
}
body.white .checkline.active{
  background:rgba(10,132,255,0.10);
  box-shadow:0 0 10px rgba(10,132,255,0.10);
}

.aiBox{
  background:rgba(0,255,136,0.08);
  border:1px solid rgba(0,255,136,0.25);
  padding:10px;
  border-radius:14px;
  font-size:14px;
  line-height:1.6;
}
.aiBox .warn{ color:#ffcc00; font-weight:900; }
.aiBox .tip{ color:var(--accent); font-weight:900; }
.aiBox .ok{ color:var(--sub); }

.fixedTotal{
  position:fixed;
  left:0;
  bottom:0;
  width:100%;
  background:var(--card);
  border-top:2px solid var(--gold);
  padding:10px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  z-index:10;
}
.fixedTotal .big{ font-size:20px; font-weight:900; color:var(--gold); }

/* Tab1：番表內容細 1pt；大項目一行兩個 */
.tab1FanBody{ font-size:12px; }
.fanGrid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
}
.fanGrid details{ margin:0; }

/* 兩位數 count input */
.input.count2{
  width:3.5ch;
  padding:8px 8px;
  text-align:center;
  border-radius:10px;
}

/* ================= TAB2 ================= */
.t2TopBox{
  background:var(--card);
  border-radius:18px;
  padding:12px;
  margin-bottom:12px;
  box-shadow:0 0 22px var(--shadow);
}
.t2RowCenter{ display:flex; justify-content:center; align-items:center; gap:10px; flex-wrap:wrap; }
.t2InfoLine{
  margin-top:8px;
  font-size:13px;
  color:var(--sub);
  text-align:center;
  line-height:1.6;
}

.mjWrap{ width:100%; max-width:420px; margin:0 auto; }
.mjGrid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:1fr 1fr 1fr;
  gap:6px;
}
.mjCell{ width:100%; aspect-ratio:1/1; position:relative; }

.seat{
  width:100%;
  height:100%;
  background:var(--muted);
  border-radius:12px;
  padding:6px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  overflow:visible;
  position:relative;
  border:2px solid transparent;
}
.seat::before{
  content:"";
  position:absolute;
  inset:2px;
  border-radius:11px;
  border:1px solid rgba(255,255,255,0.08);
  pointer-events:none;
}
.seat::after{
  content:"";
  position:absolute;
  inset:6px;
  border-radius:9px;
  border:1px solid rgba(212,175,55,0.5);
  pointer-events:none;
}
body.white .seat::after{ border-color: rgba(10,132,255,0.45); }

.seat.dealer{
  border-color: rgba(212,175,55,0.95);
  box-shadow:0 0 0 2px rgba(212,175,55,0.18) inset, 0 0 14px rgba(212,175,55,0.18);
}
body.white .seat.dealer{
  border-color: rgba(10,132,255,0.95);
  box-shadow:0 0 0 2px rgba(10,132,255,0.14) inset, 0 0 14px rgba(10,132,255,0.14);
}

.seat .nameWrap{ width:100%; display:flex; justify-content:center; }
.seat input.name{
  width:100%;
  text-align:center;
  font-size:16px;
  font-weight:900;
  border:none;
  background:transparent;
  color:var(--text);
  padding:2px 4px;
  outline:none;
  transform: scale(0.82) translateY(5px);
  transform-origin:center;
}

.seat .score{
  font-size:22px;
  font-weight:900;
  line-height:1;
  margin-top:3px;
}
.score.pos{ color:var(--pos); }
.score.neg{ color:var(--neg); }

.scoreDelta{
  position:absolute;
  left:50%;
  top:52%;
  transform:translate(-50%,-10%) scale(0.95);
  font-size:14px;
  font-weight:900;
  pointer-events:none;
  opacity:0;
  z-index:6;
  text-shadow:0 2px 12px rgba(0,0,0,0.35);
  animation: floatDelta 900ms ease-out forwards;
}
.scoreDelta.pos{ color:var(--accent); }
.scoreDelta.neg{ color:var(--neg); }
@keyframes floatDelta{
  0%{ opacity:0; transform:translate(-50%,-10%) scale(0.95); }
  15%{ opacity:1; }
  100%{ opacity:0; transform:translate(-50%,-85%) scale(1.05); }
}

.pullInfo{
  font-size:12px;
  color:var(--sub);
  line-height:1;
  transform: scale(0.88);
  transform-origin:center;
  margin-top:2px;
  min-height:14px;
}

.streakBadge{
  position:absolute;
  top:-10px;
  right:-10px;
  background:rgba(212,175,55,0.95);
  color:#000;
  border-radius:999px;
  padding:2px 8px;
  font-size:12px;
  font-weight:900;
  box-shadow:0 0 10px rgba(212,175,55,0.25);
  display:none;
  z-index:5;
}
body.white .streakBadge{
  background: rgba(10,132,255,0.95);
  box-shadow: 0 0 10px rgba(10,132,255,0.18);
  color:#fff;
}

.slashBtn{
  height:20px;
  width:70%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  font-weight:900;
  border:none;
  border-radius:8px;
  background:#cc0000;
  color:#fff;
  transform: translateY(-7px);
  padding:0;
}
.slashBtn:disabled{ opacity:0.35; }

.center{
  width:100%;
  height:100%;
  position:relative;
  border-radius:18px;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    radial-gradient(120% 120% at 50% 45%, rgba(255,255,255,0.08), rgba(0,0,0,0.25) 60%),
    linear-gradient(135deg, #0e4a2a, #07361f);
}
.center::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  pointer-events:none;
  background:
    linear-gradient(90deg,
      rgba(255,255,255,0.06) 0%,
      rgba(0,0,0,0.10) 12%,
      rgba(255,255,255,0.04) 25%,
      rgba(0,0,0,0.12) 38%,
      rgba(255,255,255,0.05) 55%,
      rgba(0,0,0,0.10) 70%,
      rgba(255,255,255,0.03) 100%),
    repeating-linear-gradient(90deg,
      rgba(0,0,0,0.16) 0px,
      rgba(0,0,0,0.16) 2px,
      rgba(255,255,255,0.03) 3px,
      rgba(255,255,255,0.03) 6px),
    linear-gradient(135deg, #5a3a1f, #3b2414 55%, #2a180d);

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;

  padding:10px;
  box-shadow:
    0 18px 28px rgba(0,0,0,0.35),
    inset 0 0 0 2px rgba(255,255,255,0.10),
    inset 0 0 22px rgba(0,0,0,0.35);
}
.center::after{
  content:"";
  position:absolute;
  inset:8.5px;
  border-radius:14px;
  pointer-events:none;

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;

  padding:8px;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.22), rgba(0,0,0,0.20)),
    rgba(212,175,55,0.12);

  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.18),
    inset 0 0 18px rgba(0,0,0,0.25);
}
body.white .center::after{
  background:
    linear-gradient(135deg, rgba(255,255,255,0.28), rgba(0,0,0,0.12)),
    rgba(10,132,255,0.08);
}

.center .outer{
  position:absolute;
  inset:22%;
  border:2px solid rgba(255,255,255,0.20);
  border-radius:15px;
  box-shadow: inset 0 0 12px rgba(0,0,0,0.25);
}
.wind{
  position:absolute;
  font-size:9px;
  font-weight:900;
  color:#fff;
  opacity:0.9;
  pointer-events:none;
}
.wind.top{ top:16.5px; left:50%; transform:translateX(-50%); }
.wind.bottom{ bottom:17.5px; left:50%; transform:translateX(-50%); }
.wind.left{ left:18.5px; top:50%; transform:translateY(-50%); }
.wind.right{ right:18.5px; top:50%; transform:translateY(-50%); }

.winBtn{
  border:none;
  border-radius:999px;
  padding:10px 18px;
  font-size:12px;
  font-weight:900;
  background:var(--gold);
  color:#000;
  cursor:pointer;
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  z-index:3;
  box-shadow: 0 10px 26px rgba(0,0,0,0.28);
}
body.white .winBtn{ color:#fff; }
.winBtn:active{ transform:translate(-50%,-50%) scale(0.96); }

.t2BottomRow{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:12px;
}
.t2BottomRow .pillAction{
  border-radius:999px !important;
  padding:12px 16px !important;
  min-width: 140px;
  box-shadow: 0 10px 26px rgba(0,0,0,0.18);
}
.t2BottomRow .pillAction:active{ transform: scale(0.97); }

.historyItem{

  else document.body.classList.remove("white");
  localStorage.setItem("theme", isWhite ? "white" : "dark");
}
function loadTheme(){

  setTheme(t === "white");
}

function updateFixedBarForTab(which){
  const btn = $("toTab2Btn");
  if(!btn) return;
  if(which === 1){
    btn.classList.remove("back");
    btn.onclick = ()=>setTab(2);
    btn.setAttribute("aria-label","去計分區");
  }else{
    btn.classList.add("back");
    btn.onclick = ()=>setTab(1);
    btn.setAttribute("aria-label","返計番區");
  }

function setTab(which){
  const t1 = $("tab1"), t2 = $("tab2");
  const b1 = $("tabBtn1"), b2 = $("tabBtn2");
  if(which === 1){
    t1.style.display = "";
    t2.style.display = "none";

function renderFanList(){

      cb.type = "checkbox";

      lab.setAttribute("for", cb.id);

        count.type = "number";

function updatePerItemCalc(id){
  const cntInput = document.querySelector(`.fanCount[data-target="${id}"]`);
  const span = document.getElementById(`calc_${id}`);
  if(!cntInput || !span) return;
  const fan = safeInt(cntInput.dataset.fan || "0", 0);
  const count = Math.max(safeInt(cntInput.value, 0), 0);
  span.textContent = `${fan*count}番`;
}

/* ================= Tab1：總番 + AI ================= */
function getBaseFan(){
  const base = safeInt($("baseFan")?.value ?? "0", 0);
  return base < 0 ? 0 : base;
}
function getRate(){
  const r = safeInt($("rate")?.value ?? "1", 1);
  return r < 0 ? 0 : r;
}
function updateTotalFan(){
  let total = 0;

  document.querySelectorAll(".fanCheck:checked").forEach(cb=>{
    const fan = safeInt(cb.dataset.fan, 0);
    const id = cb.dataset.id;
    const cntInput = document.querySelector(`.fanCount[data-target="${id}"]`);
    if(cntInput){
      const count = Math.max(safeInt(cntInput.value, 0), 0);
      total += fan * count;
    }else{
      total += fan;
    }
  });

  const times = Math.max(safeInt($("dealer_times")?.value ?? "0", 0), 0);
  const dealerFan = (times > 0) ? (times*2 + 1) : 0;
  const calc = $("dealer_times_calc");
  if(calc) calc.textContent = `${dealerFan}番`;
  total += dealerFan;

  total += getBaseFan();

  $("totalFan").innerText = String(total);

  localStorage.setItem("baseFan", String(getBaseFan()));
  localStorage.setItem("rate", String(getRate()));

  aiSuggest();
  syncFanBadgeToTab2();
}
function aiSuggest(){
  const box = $("aiBox");
  const ids = new Set();
  document.querySelectorAll(".fanCheck:checked").forEach(cb=>ids.add(cb.dataset.id));
  const msgs = [];

  if(ids.has("flower") && ids.has("noflower")) msgs.push(`<span class="warn">⚠️「花」同「無花」唔可以同時勾</span>`);
  if(ids.has("zi") && ids.has("nozi")) msgs.push(`<span class="warn">⚠️「字」同「無字」衝突</span>`);
  if(ids.has("chun1color") && ids.has("hun1color")) msgs.push(`<span class="warn">⚠️「清一色」已包含「混一色」，建議只留清一色</span>`);
  if(ids.has("chunpyun") && ids.has("banpyun")) msgs.push(`<span class="warn">⚠️「全求人」通常涵蓋「半求人」，建議只留全求人</span>`);

  msgs.push(`<span class="ok">ℹ️ 底：${getBaseFan()}番</span>`);
  msgs.push(`<span class="ok">ℹ️ 1番 = $${getRate()}</span>`);

  box.innerHTML = msgs.join("<br>");
}

/* ================= localStorage（Tab1） ================= */
function saveTab1State(){
  const checks = {};
  document.querySelectorAll(".fanCheck").forEach(cb=>{
    checks[cb.dataset.id] = cb.checked ? 1 : 0;
  });
  const counts = {};
  document.querySelectorAll(".fanCount").forEach(inp=>{
    counts[inp.dataset.target] = inp.value;
  });

  const state = {
    checks, counts,
    dealer_times: $("dealer_times")?.value ?? "0",
    baseFan: $("baseFan")?.value ?? "5",
    rate: $("rate")?.value ?? "1",
  };
  localStorage.setItem("tab1_state", JSON.stringify(state));
}
function loadTab1State(){
  const raw = localStorage.getItem("tab1_state");
  if(!raw) return;
  try{
    const s = JSON.parse(raw);
    if(s?.baseFan !== undefined) $("baseFan").value = String(s.baseFan);
    if(s?.rate !== undefined) $("rate").value = String(s.rate);
    if(s?.dealer_times !== undefined && $("dealer_times")) $("dealer_times").value = String(s.dealer_times);

    if(s?.checks){
      document.querySelectorAll(".fanCheck").forEach(cb=>{
        cb.checked = !!s.checks[cb.dataset.id];
        const line = cb.closest(".checkline");
        if(line) line.classList.toggle("active", cb.checked);
      });
    }
    if(s?.counts){
      document.querySelectorAll(".fanCount").forEach(inp=>{
        const v = s.counts[inp.dataset.target];
        if(v !== undefined) inp.value = String(v);
        updatePerItemCalc(inp.dataset.target);
      });
    }
  }catch(e){}
}
function clearTab1All(){
  document.querySelectorAll(".fanCheck").forEach(cb=>{
    cb.checked = false;
    const line = cb.closest(".checkline");
    if(line) line.classList.remove("active");
  });
  document.querySelectorAll(".fanCount").forEach(inp=>{
    inp.value="1";
    updatePerItemCalc(inp.dataset.target);
  });
  if($("dealer_times")) $("dealer_times").value = "0";
  updateTotalFan();
  saveTab1State();
}

/* ================= Tab2：座位映射（✅ 真執位） ================= */
const seatIndexToWind = ["E","N","S","W"]; // seat0->E, seat1->N, seat2->S, seat3->W
function getPidAtSeatIndex(seatIdx){
  const w = seatIndexToWind[seatIdx];
  return seatMap[w];
}
function getSeatIndexOfPid(pid){
  for(let seatIdx=0; seatIdx<4; seatIdx++){
    if(getPidAtSeatIndex(seatIdx) === pid) return seatIdx;
  }
  return -1;
}
function showScoreDeltaForPid(pid, delta){
  if(!delta) return;
  const seatIdx = getSeatIndexOfPid(pid);
  if(seatIdx < 0) return;
  const seatEl = $("seat"+seatIdx);
  if(!seatEl) return;

  const el = document.createElement("div");
  el.className = "scoreDelta " + (delta > 0 ? "pos" : "neg");
  el.textContent = (delta > 0) ? `+${delta}` : `${delta}`;
  seatEl.appendChild(el);
  el.addEventListener("animationend", ()=>el.remove());
}

/* ================= Tab2：核心狀態 ================= */
let scores = [0,0,0,0];
let dealerPlayer = 0;
let dealerStreak = [0,0,0,0];
let playerNames = ["玩家1","玩家2","玩家3","玩家4"];
let pulledNeedle = [0,0,0,0];

let chain_lastWinner = null;
let chain_lastSettleFan = 0;

let undoStack = [];
let gameHistory = [];
let seatMap = loadSeatMap();

let pullState = { puller:null, pulled:null, fan:0, needles:0 };

function isCleanPull(){
  return (pullState.puller === null || pullState.pulled === null || pullState.fan <= 0 || pullState.needles <= 0);
}
function clearPull(){
  pullState = { puller:null, pulled:null, fan:0, needles:0 };
  syncPulledNeedleFromPullState();
}
function syncPulledNeedleFromPullState(){
  pulledNeedle = [0,0,0,0];
  if(!isCleanPull()){
    pulledNeedle[pullState.pulled] = pullState.needles;
  }
}
function startOrContinuePull(pullerPid, pulledPid, baseFan){
  if(isCleanPull() || pullState.puller !== pullerPid || pullState.pulled !== pulledPid){
    pullState = { puller: pullerPid, pulled: pulledPid, fan: baseFan, needles: 1 };
    syncPulledNeedleFromPullState();
    return pullState.fan;
  }
  const nextFan = ceilUp(pullState.fan * 1.5 + baseFan);
  pullState = { puller: pullerPid, pulled: pulledPid, fan: nextFan, needles: pullState.needles + 1 };
  syncPulledNeedleFromPullState();
  return pullState.fan;
}
function getPlayerName(pid){
  const v = (playerNames[pid] ?? "").trim();
  return v ? v : `玩家${pid+1}`;
}

function syncFanBadgeToTab2(){
  const total = safeInt($("totalFan")?.innerText ?? "0", 0);
  const badge = $("t2FanBadge");
  if(badge) badge.textContent = `本局番數：${total}`;
}

function renderAllTab2(){
  for(let seatIdx=0; seatIdx<4; seatIdx++){
    const pid = getPidAtSeatIndex(seatIdx);

    const nameEl = $("n"+seatIdx);
    if(nameEl){
      if(document.activeElement !== nameEl){
        nameEl.value = getPlayerName(pid);
      }
    }

    const scEl = $("sc"+seatIdx);
    if(scEl){
      const v = safeInt(scores[pid], 0);
      scEl.textContent = String(v);
      scEl.classList.remove("pos","neg");
      if(v > 0) scEl.classList.add("pos");
      else if(v < 0) scEl.classList.add("neg");
    }

    const piEl = $("pi"+seatIdx);
    if(piEl){
      const n = safeInt(pulledNeedle[pid], 0);
      piEl.textContent = n > 0 ? `被拉緊第 ${n} 針` : "";
    }

    const seatEl = $("seat"+seatIdx);
    if(seatEl) seatEl.classList.toggle("dealer", pid === dealerPlayer);

    const st = $("st"+seatIdx);
    if(st){
      if(pid === dealerPlayer && (dealerStreak[dealerPlayer]||0) > 0){
        st.textContent = `👑x${dealerStreak[dealerPlayer]}`;
        st.style.display = "";
      }else{
        st.style.display = "none";
      }
    }

    const sl = $("sl"+seatIdx);
    if(sl){
      const n = safeInt(pulledNeedle[pid], 0);
      sl.disabled = !(n > 0 && n % 3 === 0);
    }
  }
}

function pushUndoSnapshot(){
  undoStack.push(JSON.parse(JSON.stringify({
    scores, dealerPlayer, dealerStreak,
    playerNames, pulledNeedle,
    chain_lastWinner, chain_lastSettleFan,
    history: gameHistory,
    seatMap,
    pullState
  })));
  if(undoStack.length > 80) undoStack.shift();
}
function restoreSnapshot(snap){
  if(!snap) return;
  scores = snap.scores || [0,0,0,0];
  dealerPlayer = snap.dealerPlayer ?? 0;
  dealerStreak = snap.dealerStreak || [0,0,0,0];
  playerNames = snap.playerNames || ["玩家1","玩家2","玩家3","玩家4"];
  pulledNeedle = snap.pulledNeedle || [0,0,0,0];
  chain_lastWinner = (snap.chain_lastWinner === undefined) ? null : snap.chain_lastWinner;
  chain_lastSettleFan = snap.chain_lastSettleFan || 0;
  gameHistory = snap.history || [];
  seatMap = snap.seatMap || {E:0,S:2,W:3,N:1};
  pullState = snap.pullState || { puller:null, pulled:null, fan:0, needles:0 };

  syncPulledNeedleFromPullState();
  saveSeatMap(seatMap);

  renderAllTab2();
  renderHistory();
  syncFanBadgeToTab2();
  saveTab2State();
}
function undoLast(){
  if(undoStack.length === 0){ alert("無得撤銷"); return; }
  const snap = undoStack.pop();
  restoreSnapshot(snap);
}

function slashSeat(seatIdx){
  const pid = getPidAtSeatIndex(seatIdx);
  const n = safeInt(pulledNeedle[pid], 0);
  if(!(n > 0 && n % 3 === 0)) return;
  if(!isCleanPull() && pullState.pulled === pid){
    pushUndoSnapshot();
    clearPull();
    $("t2_info").textContent = `⚔️ ${getPlayerName(pid)} 已斬（清拉）`;
    renderAllTab2();
    saveTab2State();
  }
}

/* ======================= ✅ 拉劈引撆邏輯 ======================= */
function applyExtraTransfer(fromPid, toPid, fan, rate, deltas){
  const amt = fan * rate;
  deltas[fromPid] -= amt;
  deltas[toPid] += amt;
  return amt;
}
function applyHalfTransferFloor(fromPid, toPid, fan, rate, deltas){
  const halfFan = Math.floor(fan / 2);
  const amt = halfFan * rate;
  deltas[fromPid] -= amt;
  deltas[toPid] += amt;
  return { halfFan, amt };
}

function shouldYinPik(winnerPid, loserPid, isSelf){
  if(isCleanPull()) return false;
  const puller = pullState.puller;
  const pulled = pullState.pulled;

  if(!isSelf && winnerPid === pulled && loserPid !== null && loserPid !== puller){
    return true;
  }
  if(winnerPid !== puller && winnerPid !== pulled){
    if(isSelf){
      return true;
    }
    if(loserPid === pulled){
      return true;
    }
  }
  return false;
}

/* ✅ (c) Fix：自摸唔應該自動清拉
   劈 只會喺「拉者食被拉者」先觸發（半數清拉）
*/
function shouldPik(winnerPid, loserPid, isSelf){
  if(isCleanPull()) return false;
  const puller = pullState.puller;
  const pulled = pullState.pulled;

  if(winnerPid !== puller) return false;
  if(isSelf) return false;                 // ✅ 關鍵：自摸唔劈
  return (loserPid === pulled);
}

/* ======================= ✅ 結算 ======================= */
function settleRound(winnerPid, loserPid, isSelf){
  const baseFan = safeInt($("totalFan")?.innerText ?? "0", 0);
  if(baseFan <= 0){
    alert("Tab1 總番數係 0，先去 Tab1 勾番");
    return;
  }
  const rate = getRate();

  let settleFan = baseFan;
  let pullNote = "";
  let thisIsPulling = (!isSelf && typeof loserPid === "number");

  if(thisIsPulling){
    settleFan = startOrContinuePull(winnerPid, loserPid, baseFan);
    pullNote = `拉${pullState.needles}針→拉番${settleFan}`;
  }else{
    syncPulledNeedleFromPullState();
  }

  const amount = settleFan * rate;

  const deltas = [0,0,0,0];
  if(isSelf){
    for(let p=0;p<4;p++){
      if(p !== winnerPid){
        deltas[p] -= amount;
        deltas[winnerPid] += amount;
      }
    }
  }else{
    deltas[loserPid] -= amount;
    deltas[winnerPid] += amount;
  }

  let extraText = "";

  if(shouldYinPik(winnerPid, loserPid, isSelf)){
    const extraAmt = applyExtraTransfer(pullState.pulled, pullState.puller, pullState.fan, rate, deltas);
    extraText = `｜引撆：${getPlayerName(pullState.pulled)} → ${getPlayerName(pullState.puller)} 全數拉番${pullState.fan}（$${extraAmt}）`;
  }

  if(shouldPik(winnerPid, loserPid, isSelf)){
    const r = applyHalfTransferFloor(pullState.pulled, pullState.puller, pullState.fan, rate, deltas);
    extraText = `｜劈：${getPlayerName(pullState.pulled)} → ${getPlayerName(pullState.puller)} 半數拉番${r.halfFan}（$${r.amt}）清拉`;
    clearPull();
  }

  for(let p=0;p<4;p++) scores[p] += deltas[p];
  for(let p=0;p<4;p++) showScoreDeltaForPid(p, deltas[p]);

  if(winnerPid === dealerPlayer){
    dealerStreak[dealerPlayer] = (dealerStreak[dealerPlayer]||0) + 1;
  }else{
    dealerStreak[dealerPlayer] = 0;
    dealerPlayer = winnerPid;
    dealerStreak[dealerPlayer] = 1;
  }

  const winName = getPlayerName(winnerPid);
  const typeTxt = isSelf ? "自摸" : `食胡（食 ${getPlayerName(loserPid)}）`;

  const pullStatus = isCleanPull()
    ? "清拉"
    : `拉者${getPlayerName(pullState.puller)}｜被拉${getPlayerName(pullState.pulled)}｜拉番${pullState.fan}｜第${pullState.needles}針`;

  $("t2_info").innerHTML =
    `✅ ${winName} ${typeTxt}<br>`+
    `本局番：${baseFan}｜找數番：${settleFan}｜1番=$${rate} → $${amount}`+
    (pullNote ? `｜${pullNote}` : "")+
    `${extraText}<br>`+
    `（${pullStatus}）`;

  gameHistory.push({
    kind:"win",
    ts: Date.now(),
    winner: winnerPid,
    loser: isSelf ? null : loserPid,
    isSelf,
    baseFan,
    settleFan,
    amount,
    pullState: JSON.parse(JSON.stringify(pullState)),
    note: pullNote,
    extra: extraText
  });

  renderAllTab2();
  renderHistory();
  saveTab2State();
}

/* History */
function renderHistory(){
  const box = $("historyList");
  if(!box) return;
  if(!gameHistory.length){
    box.innerHTML = "（未有紀錄）";
    return;
  }

  box.innerHTML = gameHistory.slice().reverse().map((r, idxFromEnd)=>{
    const roundNo = gameHistory.length - idxFromEnd;
    if(r.kind === "yin"){
      return `
        <div class="historyItem">
          <div class="title">#${roundNo} 陰蟄錢：${r.yinType} → ${getPlayerName(r.player)}</div>
          <div class="meta">${fmtTime(r.ts)}｜已按規則加減分</div>
        </div>
      `;
    }

    const winName = getPlayerName(r.winner);
    const typeTxt = r.isSelf ? "自摸" : `食胡（食 ${getPlayerName(r.loser)}）`;

    const extra = [
      `本局番${r.baseFan}`,
      `找數番${r.settleFan}`,
      `金額$${r.amount}`,
      (r.note ? r.note : ""),
      (r.extra ? r.extra.replace(/^｜/,"") : "")
    ].filter(Boolean).join("｜");

    return `
      <div class="historyItem">
        <div class="title">第 ${roundNo} 局：${winName} ${typeTxt}</div>
        <div class="meta">${fmtTime(r.ts)}｜${extra}</div>
      </div>
    `;
  }).join("");
}

async function copyHistory(){
  if(!gameHistory.length){ alert("無紀錄可以複製"); return; }
  const lines = gameHistory.map((r,idx)=>{
    const no = idx+1;
    if(r.kind === "yin"){
      return `#${no} 陰蟄錢：${r.yinType} → ${getPlayerName(r.player)}｜已按規則加減分`;
    }
    const winName = getPlayerName(r.winner);
    const typeTxt = r.isSelf ? "自摸" : `食胡（食 ${getPlayerName(r.loser)}）`;
    const extra = [
      `本局番${r.baseFan}`,
      `找數番${r.settleFan}`,
      `金額$${r.amount}`,
      (r.note ? r.note : ""),
      (r.extra ? r.extra.replace(/^｜/,"") : "")
    ].filter(Boolean).join("｜");
    return `#${no}：${winName} ${typeTxt}｜${extra}`;
  }).join("\n");

  try{
    await navigator.clipboard.writeText(lines);
    alert("已複製到剪貼簿");
  }catch(e){
    prompt("iPhone 有時限制剪貼簿，複製下面文字：", lines);
  }
}
function clearHistory(){
  if(!confirm("確定清晒紀錄？")) return;
  pushUndoSnapshot();
  gameHistory = [];
  renderHistory();
  saveTab2State();
}

/* =================== Bottom Sheet helpers =================== */
function openSheet(maskId, sheetId){
  const m = $(maskId);
  const s = $(sheetId);
  if(!m || !s) return;
  m.style.display = "flex";
  requestAnimationFrame(()=>s.classList.add("show"));
}
function closeSheet(maskId, sheetId){
  const m = $(maskId);
  const s = $(sheetId);
  if(!m || !s) return;
  s.classList.remove("show");
  setTimeout(()=>{ m.style.display = "none"; }, 280);
}
function bindSheetBackdrop(maskId, sheetId){
  const m = $(maskId);
  const s = $(sheetId);
  if(!m || !s) return;
  m.addEventListener("click", (e)=>{
    if(e.target === m) closeSheet(maskId, sheetId);
  });
}

/* 食胡 sheet */
let modalWin = new Set();
let modalLose = null;
let modalSelf = false;

function openWinModal(){
  modalWin = new Set();
  modalLose = null;
  modalSelf = false;
  $("multiChk").checked = false;
  renderWinModal();
  openSheet("winMask","winSheet");
}
function closeWinModal(){ closeSheet("winMask","winSheet"); }

function renderWinModal(){
  const multi = $("multiChk").checked;
  const winList = $("winList");
  const loseList = $("loseList");
  winList.innerHTML = "";
  loseList.innerHTML = "";

  for(let p=0;p<4;p++){
    const b = document.createElement("button");
    b.type = "button";
    b.className = "pickBtn";
    b.textContent = getPlayerName(p);
    b.classList.toggle("active", modalWin.has(p));
    b.onclick = ()=>{
      if(!multi){
        modalWin = new Set([p]);
      }else{
        if(modalWin.has(p)) modalWin.delete(p);
        else modalWin.add(p);
      }
      if(modalLose !== null && modalWin.has(modalLose)) modalLose = null;

      if(modalWin.size === 0){
        modalSelf = false;
        modalLose = null;
      }
      renderWinModal();
    };
    winList.appendChild(b);
  }

  if(modalWin.size > 0){
    const sb = document.createElement("button");
    sb.type = "button";
    sb.className = "selfBtn";
    sb.textContent = "自摸";
    sb.classList.toggle("active", modalSelf);
    sb.onclick = ()=>{
      modalSelf = !modalSelf;
      if(modalSelf) modalLose = null;
      renderWinModal();
    };
    loseList.appendChild(sb);
  }

  for(let p=0;p<4;p++){
    if(modalWin.has(p)) continue;
    const b = document.createElement("button");
    b.type = "button";
    b.className = "pickBtn";
    b.textContent = getPlayerName(p);
    b.classList.toggle("active", modalLose === p);
    if(modalSelf) b.classList.add("disabled");
    b.onclick = ()=>{
      if(modalSelf) return;
      modalLose = p;
      renderWinModal();
    };
    loseList.appendChild(b);
  }

  if(!multi && modalWin.size > 1){
    $("winHint").textContent = "⚠️ 未剔一炮多響：食胡玩家只可揀一個";
  }else{
    $("winHint").textContent = "";
  }
}

function confirmWinModal(){
  const multi = $("multiChk").checked;
  if(modalWin.size === 0){ alert("未揀食胡玩家"); return; }
  if(!multi && modalWin.size !== 1){ alert("未剔一炮多響：食胡玩家只可揀一個"); return; }

  pushUndoSnapshot();

  if(modalSelf){
    if(modalWin.size !== 1){
      alert("自摸暫時只可揀一個食胡玩家");
      return;
    }
    const w = [...modalWin][0];
    settleRound(w, null, true);
    closeWinModal();
    return;
  }

  if(modalLose === null){
    alert("未揀出銃玩家（或者改用自摸）");
    return;
  }

  if(modalWin.size === 1){
    const w = [...modalWin][0];
    settleRound(w, modalLose, false);
    closeWinModal();
    return;
  }

  const baseFan = safeInt($("totalFan")?.innerText ?? "0", 0);
  if(baseFan <= 0){
    alert("Tab1 總番數係 0，先去 Tab1 勾番");
    return;
  }
  const rate = getRate();
  const winners = [...modalWin];

  const perAmt = baseFan * rate;
  const deltas = [0,0,0,0];
  deltas[modalLose] -= perAmt * winners.length;
  winners.forEach(w=> deltas[w] += perAmt);

  let extraText = "";
  if(!isCleanPull()){
    const puller = pullState.puller;
    const pulled = pullState.pulled;

    const discarderIsPuller = (modalLose === puller);
    const pulledIsWinner = winners.includes(pulled);

    if(discarderIsPuller && pulledIsWinner){
      const r = applyHalfTransferFloor(pulled, puller, pullState.fan, rate, deltas);
      extraText = `｜多響劈：${getPlayerName(pulled)} → ${getPlayerName(puller)} 半數拉番${r.halfFan}（$${r.amt}）清拉`;
      clearPull();
    }else{
      const amt = applyExtraTransfer(pulled, puller, pullState.fan, rate, deltas);
      extraText = `｜多響全數：${getPlayerName(pulled)} → ${getPlayerName(puller)} 全數拉番${pullState.fan}（$${amt}）`;
      syncPulledNeedleFromPullState();
    }
  }

  for(let p=0;p<4;p++) scores[p] += deltas[p];
  for(let p=0;p<4;p++) showScoreDeltaForPid(p, deltas[p]);

  const leader = winners[0];
  if(leader === dealerPlayer){
    dealerStreak[dealerPlayer] = (dealerStreak[dealerPlayer]||0) + 1;
  }else{
    dealerStreak[dealerPlayer] = 0;
    dealerPlayer = leader;
    dealerStreak[dealerPlayer] = 1;
  }

  const winNames = winners.map(getPlayerName).join("、");
  const pullStatus = isCleanPull()
    ? "清拉"
    : `拉者${getPlayerName(pullState.puller)}｜被拉${getPlayerName(pullState.pulled)}｜拉番${pullState.fan}｜第${pullState.needles}針`;

  $("t2_info").innerHTML =
    `✅ ${winNames} 一炮多響（食 ${getPlayerName(modalLose)}）<br>`+
    `本局番：${baseFan}｜每份$${perAmt}｜出銃總賠$${perAmt*winners.length}`+
    `${extraText}<br>`+
    `（${pullStatus}）`;

  gameHistory.push({
    kind:"win",
    ts: Date.now(),
    winner: leader,
    loser: modalLose,
    isSelf:false,
    baseFan,
    settleFan: baseFan,
    amount: perAmt*winners.length,
    multiWinners: winners,
    extra: extraText,
    pullState: JSON.parse(JSON.stringify(pullState))
  });

  renderAllTab2();
  renderHistory();
  saveTab2State();

  closeWinModal();
}

/* 執位 */
function loadSeatMap(){
  const raw = localStorage.getItem("seatMap");
  if(!raw) return {E:0,S:2,W:3,N:1};
  try{
    const s = JSON.parse(raw);
    return {E:s.E??0,S:s.S??2,W:s.W??3,N:s.N??1};
  }catch(e){
    return {E:0,S:2,W:3,N:1};
  }
}
function saveSeatMap(m){ localStorage.setItem("seatMap", JSON.stringify(m)); }

function openSeatModal(){
  const body = $("seatBody");
  body.innerHTML = "";
  const winds = [
    {k:"E", label:"東"},
    {k:"S", label:"南"},
    {k:"W", label:"西"},
    {k:"N", label:"北"},
  ];
  const cur = {...seatMap};

  winds.forEach(w=>{
    const row = document.createElement("div");
    row.className = "seatRow";

    const tag = document.createElement("div");
    tag.className = "windTag";
    tag.textContent = w.label;

    const sel = document.createElement("select");
    sel.className = "input";
    sel.dataset.wind = w.k;

    for(let p=0;p<4;p++){
      const o = document.createElement("option");
      o.value = String(p);
      o.textContent = getPlayerName(p);
      sel.appendChild(o);
    }
    sel.value = String(cur[w.k] ?? 0);

    sel.addEventListener("change", ()=>{
      const want = safeInt(sel.value, 0);
      for(const other of winds){
        if(other.k === w.k) continue;
        const otherSel = body.querySelector(`select[data-wind="${other.k}"]`);
        if(!otherSel) continue;
        if(safeInt(otherSel.value, -1) === want){
          otherSel.value = String(cur[w.k] ?? 0);
          break;
        }
      }
      winds.forEach(xx=>{
        const s = body.querySelector(`select[data-wind="${xx.k}"]`);
        cur[xx.k] = safeInt(s.value, 0);
      });
    });

    row.appendChild(tag);
    row.appendChild(sel);
    body.appendChild(row);
  });

  openSheet("seatMask","seatSheet");
  window.__seatDraft = cur;
}
function closeSeatModal(){ closeSheet("seatMask","seatSheet"); window.__seatDraft = null; }
function confirmSeatModal(){
  pushUndoSnapshot();
  const draft = window.__seatDraft;
  if(draft){
    seatMap = {E:draft.E, S:draft.S, W:draft.W, N:draft.N};
    saveSeatMap(seatMap);
  }
  $("t2_info").textContent = "🪑 已執位）";
  renderAllTab2();
  saveTab2State();
  closeSeatModal();
}

/* ✅ 收陰蟄錢 sheet */
const yinTypes = ["追殺","暗槓","花","草","詐胡"];
let yinTypeSel = null;
let yinPlayerSel = null;

function openYinModal(){
  yinTypeSel = null;
  yinPlayerSel = null;
  renderYinModal();
  openSheet("yinMask","yinSheet");
}
function closeYinModal(){ closeSheet("yinMask","yinSheet"); }

function renderYinModal(){
  const lt = $("yinTypeList");
  const rp = $("yinPlayerList");
  lt.innerHTML = "";
  rp.innerHTML = "";

  yinTypes.forEach((t)=>{
    const b = document.createElement("button");
    b.type = "button";
    b.className = "pickBtn";
    b.textContent = t;
    b.classList.toggle("active", yinTypeSel === t);
    b.onclick = ()=>{
      yinTypeSel = t;
      renderYinModal();
    };
    lt.appendChild(b);
  });

  for(let p=0;p<4;p++){
    const b = document.createElement("button");
    b.type = "button";
    b.className = "pickBtn";
    b.textContent = getPlayerName(p);
    b.classList.toggle("active", yinPlayerSel === p);
    b.onclick = ()=>{
      yinPlayerSel = p;
      renderYinModal();
    };
    rp.appendChild(b);
  }
}

function applyYinMoney(type, player){
  const deltas = [0,0,0,0];
  const applyAll = (selDelta, otherDelta)=>{
    for(let p=0;p<4;p++){
      deltas[p] += (p === player) ? selDelta : otherDelta;
    }
  };

  if(type === "追殺") applyAll(-15, +5);
  else if(type === "詐胡") applyAll(-90, +30);
  else if(type === "花" || type === "暗槓") applyAll(+15, -5);
  else if(type === "草") applyAll(+9, -3);

  for(let p=0;p<4;p++) scores[p] += deltas[p];
  return deltas;
}

function confirmYinModal(){
  if(!yinTypeSel){ alert("未揀陰蟄錢類型"); return; }
  if(typeof yinPlayerSel !== "number"){ alert("未揀玩家"); return; }

  pushUndoSnapshot();

  const deltas = applyYinMoney(yinTypeSel, yinPlayerSel);
  for(let p=0;p<4;p++) showScoreDeltaForPid(p, deltas[p]);

  $("t2_info").innerHTML = `💰 陰蟄錢：${yinTypeSel} → ${getPlayerName(yinPlayerSel)}`;

  gameHistory.push({
    kind:"yin",
    ts: Date.now(),
    yinType: yinTypeSel,
    player: yinPlayerSel
  });

  renderAllTab2();
  renderHistory();
  saveTab2State();
  closeYinModal();
}

/* Tab2 storage */
function saveTab2State(){
  const state = {
    scores, dealerPlayer, dealerStreak,
    playerNames, pulledNeedle,
    chain_lastWinner, chain_lastSettleFan,
    history: gameHistory,
    seatMap,
    pullState
  };
  localStorage.setItem("tab2_state", JSON.stringify(state));
}
function loadTab2State(){
  const raw = localStorage.getItem("tab2_state");
  if(!raw) return;
  try{
    const s = JSON.parse(raw);
    if(Array.isArray(s?.scores)) scores = s.scores.map(x=>safeInt(x,0));
    dealerPlayer = s.dealerPlayer ?? 0;
    if(Array.isArray(s?.dealerStreak)) dealerStreak = s.dealerStreak.map(x=>safeInt(x,0));
    if(Array.isArray(s?.playerNames)) playerNames = s.playerNames.map((x,i)=> (String(x||"").trim() || `玩家${i+1}`));
    if(Array.isArray(s?.pulledNeedle)) pulledNeedle = s.pulledNeedle.map(x=>safeInt(x,0));
    chain_lastWinner = (s.chain_lastWinner === undefined) ? null : s.chain_lastWinner;
    chain_lastSettleFan = safeInt(s.chain_lastSettleFan, 0);
    if(Array.isArray(s?.history)) gameHistory = s.history;
    if(s?.seatMap){
      seatMap = {E:s.seatMap.E??seatMap.E, S:s.seatMap.S??seatMap.S, W:s.seatMap.W??seatMap.W, N:s.seatMap.N??seatMap.N};
      saveSeatMap(seatMap);
    }
    if(s?.pullState){
      pullState = {
        puller: (typeof s.pullState.puller === "number") ? s.pullState.puller : null,
        pulled: (typeof s.pullState.pulled === "number") ? s.pullState.pulled : null,
        fan: safeInt(s.pullState.fan, 0),
        needles: safeInt(s.pullState.needles, 0),
      };
    }
    syncPulledNeedleFromPullState();
  }catch(e){}
}

/* bind events */
function bindEvents(){
  $("themeBtn").addEventListener("click", ()=>setTheme(!document.body.classList.contains("white")));
  $("tabBtn1").addEventListener("click", ()=>setTab(1));
  $("tabBtn2").addEventListener("click", ()=>setTab(2));

  updateFixedBarForTab(1);

  $("baseFan").addEventListener("input", ()=>{ updateTotalFan(); saveTab1State(); });
  $("rate").addEventListener("input", ()=>{ updateTotalFan(); saveTab1State(); });
  $("resetBaseBtn").addEventListener("click", ()=>{
    $("baseFan").value = "5";
    updateTotalFan();
    saveTab1State();
  });

  $("clearBtn").addEventListener("click", clearTab1All);

  /* ✅ (d) 撳中間番數 badge：同步番表/總番數 + 跳返 Tab1 */
  $("fanPill").addEventListener("click", ()=>{
    loadTab1State();     // 同步番表勾選 + counts + 底/幾錢
    updateTotalFan();    // 同步總番數（fix bar / Tab2 badge 都會更新）
    setTab(1);
  });

  for(let seatIdx=0; seatIdx<4; seatIdx++){
    const el = $("n"+seatIdx);
    el.addEventListener("input", ()=>{
      const pid = getPidAtSeatIndex(seatIdx);
      playerNames[pid] = (el.value ?? "").slice(0,12);
      saveTab2State();

      if($("winMask").style.display === "flex") renderWinModal();
      if($("dealerMask").style.display === "flex") openDealerModal();
      if($("seatMask").style.display === "flex") openSeatModal();
      if($("yinMask").style.display === "flex") renderYinModal();
      renderHistory();
    });
  }

  bindSheetBackdrop("winMask","winSheet");
  bindSheetBackdrop("dealerMask","dealerSheet");
  bindSheetBackdrop("seatMask","seatSheet");
  bindSheetBackdrop("yinMask","yinSheet");

  $("winBtn").addEventListener("click", openWinModal);
  $("multiChk").addEventListener("change", ()=>{
    if(!$("multiChk").checked && modalWin.size > 1){
      const first = [...modalWin][0];
      modalWin = new Set([first]);
    }
    renderWinModal();
  });
  $("winCancelBtn").addEventListener("click", closeWinModal);
  $("winOkBtn").addEventListener("click", confirmWinModal);

  $("dealerBtn").addEventListener("click", openDealerModal);
  $("dealerCancelBtn").addEventListener("click", closeDealerModal);
  $("dealerOkBtn").addEventListener("click", confirmDealerModal);

  $("seatBtn").addEventListener("click", openSeatModal);
  $("seatCancelBtn").addEventListener("click", closeSeatModal);
  $("seatOkBtn").addEventListener("click", confirmSeatModal);

  $("yinBtn").addEventListener("click", openYinModal);
  $("yinCancelBtn").addEventListener("click", closeYinModal);
  $("yinOkBtn").addEventListener("click", confirmYinModal);

  for(let seatIdx=0; seatIdx<4; seatIdx++){
    $("sl"+seatIdx).addEventListener("click", ()=>slashSeat(seatIdx));
  }

  $("undoBtn").addEventListener("click", undoLast);
  $("resetBtn").addEventListener("click", ()=>{
    pushUndoSnapshot();
    scores = [0,0,0,0];
    clearPull();
    chain_lastWinner = null;
    chain_lastSettleFan = 0;
    dealerStreak = [0,0,0,0];
    $("t2_info").textContent = "🧹 已清零";
    renderAllTab2();
    saveTab2State();
  });

  $("copyHistoryBtn").addEventListener("click", copyHistory);
  $("clearHistoryBtn").addEventListener("click", clearHistory);
}

/* init */
document.addEventListener("DOMContentLoaded", ()=>{
  loadTheme();
  renderFanList();
  bindEvents();

  loadTab1State();
  updateTotalFan();

  seatMap = loadSeatMap();

  loadTab2State();
  renderAllTab2();
  renderHistory();
  syncFanBadgeToTab2();

  setTab(1);
});
</script>
